```html
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mexa - Demo</title>
</head>
<body>

<h2>🔐 Login</h2>
<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">
<button onclick="login()">Login</button>

<hr>

<h2>📦 Productos</h2>
<button onclick="cargarProductos()">Cargar productos</button>
<ul id="listaProductos"></ul>

<hr>

<h2>➕ Crear Producto</h2>
<input id="nombre" placeholder="Nombre">
<input id="codigo" placeholder="Código">
<input id="tipo" placeholder="Tipo">
<input id="cantidad" placeholder="Cantidad">
<button onclick="crearProducto()">Crear</button>

<hr>

<h2>📤 Salida</h2>
<input id="producto_id" placeholder="Producto ID">
<input id="cantidad_salida" placeholder="Cantidad">
<button onclick="salida()">Salida</button>

<script>
let token = "";

async function login() {
  const res = await fetch("https://mexa-core-1.onrender.com/auth/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  });
  const data = await res.json();
  token = data.access_token;
  alert("Login OK");
}

async function cargarProductos() {
  const res = await fetch("https://mexa-core-1.onrender.com/productos/", {
    headers: { "Authorization": "Bearer " + token }
  });
  const data = await res.json();

  const lista = document.getElementById("listaProductos");
  lista.innerHTML = "";

  data.forEach(p => {
    const li = document.createElement("li");
    li.innerText = p.id + " - " + p.nombre + " (" + p.cantidad + ")";
    lista.appendChild(li);
  });
}

async function crearProducto() {
  await fetch("https://mexa-core-1.onrender.com/productos/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      nombre: document.getElementById("nombre").value,
      codigo: document.getElementById("codigo").value,
      tipo: document.getElementById("tipo").value,
      cantidad: parseInt(document.getElementById("cantidad").value)
    })
  });
  alert("Producto creado");
}

async function salida() {
  await fetch("https://mexa-core-1.onrender.com/movimientos/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      producto_id: parseInt(document.getElementById("producto_id").value),
      tipo: "salida",
      cantidad: parseInt(document.getElementById("cantidad_salida").value)
    })
  });
  alert("Salida registrada");
}
</script>

</body>
</html>
