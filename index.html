<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mexa.Digital - Inventario</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fb;
      color: #1f2937;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      padding: 20px;
      margin-bottom: 20px;
    }

    h1, h2, h3 {
      margin-bottom: 14px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    label {
      font-size: 14px;
      font-weight: bold;
      color: #374151;
    }

    input, select, button, textarea {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    button {
      cursor: pointer;
      border: none;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .hidden {
      display: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .status {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .status.ok {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .status.info {
      background: #dbeafe;
      color: #1d4ed8;
      border: 1px solid #93c5fd;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      background: white;
      overflow: hidden;
      border-radius: 12px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #111827;
      color: white;
    }

    tr:hover td {
      background: #f9fafb;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .pill.entrada {
      background: #dcfce7;
      color: #166534;
    }

    .pill.salida {
      background: #fee2e2;
      color: #991b1b;
    }

    .muted {
      color: #6b7280;
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .empty {
      padding: 20px;
      text-align: center;
      color: #6b7280;
      background: #f9fafb;
      border: 1px dashed #cbd5e1;
      border-radius: 12px;
      margin-top: 12px;
    }

    .small {
      font-size: 12px;
      color: #6b7280;
      margin-top: 5px;
    }

    @media (max-width: 768px) {
      th, td {
        font-size: 12px;
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1>Mexa.Digital</h1>
        <div class="muted">Inventario básico con login, productos y movimientos</div>
      </div>
      <div class="actions">
        <button id="btnReload" class="btn-secondary hidden">Recargar</button>
        <button id="btnLogout" class="btn-danger hidden">Cerrar sesión</button>
      </div>
    </div>

    <div id="statusBox" class="status info">Listo.</div>

    <!-- LOGIN -->
    <section id="loginSection" class="card">
      <h2>Login</h2>
      <div class="row">
        <div class="field">
          <label for="email">Correo</label>
          <input id="email" type="email" placeholder="admin2@mexa.com" />
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input id="password" type="password" placeholder="********" />
        </div>
      </div>
      <div class="actions">
        <button id="btnLogin" class="btn-primary">Entrar</button>
      </div>
      <div class="small">
        API: <span id="apiUrlText"></span>
      </div>
    </section>

    <!-- APP -->
    <section id="appSection" class="hidden">
      <div class="card">
        <h2>Registrar movimiento</h2>

        <div class="row">
          <div class="field">
            <label for="productoSelect">Producto</label>
            <select id="productoSelect">
              <option value="">Selecciona un producto</option>
            </select>
          </div>

          <div class="field">
            <label for="tipoMovimiento">Tipo</label>
            <select id="tipoMovimiento">
              <option value="entrada">Entrada</option>
              <option value="salida">Salida</option>
            </select>
          </div>

          <div class="field">
            <label for="cantidadMovimiento">Cantidad</label>
            <input id="cantidadMovimiento" type="number" min="1" placeholder="Ej. 5" />
          </div>

          <div class="field">
            <label for="usuarioMovimiento">Usuario</label>
            <input id="usuarioMovimiento" type="text" placeholder="Ej. admin2@mexa.com" />
          </div>
        </div>

        <div class="field">
          <label for="notaMovimiento">Nota</label>
          <textarea id="notaMovimiento" rows="3" placeholder="Opcional"></textarea>
        </div>

        <div class="actions">
          <button id="btnGuardarMovimiento" class="btn-primary">Guardar movimiento</button>
        </div>
      </div>

      <div class="card">
        <h2>Productos</h2>
        <div id="productosContainer"></div>
      </div>

      <div class="card">
        <h2>Movimientos</h2>
        <div id="movimientosContainer"></div>
      </div>
    </section>
  </div>

  <script>
    // =========================
    // CONFIG
    // =========================
    const API_BASE = "https://mexa-core-1.onrender.com";
    document.getElementById("apiUrlText").textContent = API_BASE;

    // =========================
    // ELEMENTOS
    // =========================
    const statusBox = document.getElementById("statusBox");

    const loginSection = document.getElementById("loginSection");
    const appSection = document.getElementById("appSection");

    const btnLogin = document.getElementById("btnLogin");
    const btnLogout = document.getElementById("btnLogout");
    const btnReload = document.getElementById("btnReload");
    const btnGuardarMovimiento = document.getElementById("btnGuardarMovimiento");

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");

    const productoSelect = document.getElementById("productoSelect");
    const tipoMovimiento = document.getElementById("tipoMovimiento");
    const cantidadMovimiento = document.getElementById("cantidadMovimiento");
    const usuarioMovimiento = document.getElementById("usuarioMovimiento");
    const notaMovimiento = document.getElementById("notaMovimiento");

    const productosContainer = document.getElementById("productosContainer");
    const movimientosContainer = document.getElementById("movimientosContainer");

    // =========================
    // ESTADO
    // =========================
    let productos = [];
    let movimientos = [];

    // =========================
    // HELPERS
    // =========================
    function setStatus(message, type = "info") {
      statusBox.className = `status ${type}`;
      statusBox.textContent = message;
    }

    function getToken() {
      return localStorage.getItem("mexa_token") || "";
    }

    function setToken(token) {
      localStorage.setItem("mexa_token", token);
    }

    function clearToken() {
      localStorage.removeItem("mexa_token");
    }

    function authHeaders(extra = {}) {
      const token = getToken();
      return {
        "Content-Type": "application/json",
        ...(token ? { Authorization: `Bearer ${token}` } : {}),
        ...extra
      };
    }

    function formatDate(dateStr) {
      if (!dateStr) return "-";
      const date = new Date(dateStr);
      if (isNaN(date.getTime())) return dateStr;
      return date.toLocaleString("es-MX");
    }

    function escapeHtml(text) {
      if (text === null || text === undefined) return "";
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function toggleApp(isLogged) {
      loginSection.classList.toggle("hidden", isLogged);
      appSection.classList.toggle("hidden", !isLogged);
      btnLogout.classList.toggle("hidden", !isLogged);
      btnReload.classList.toggle("hidden", !isLogged);
    }

    function getProductoNombre(productoId) {
      const producto = productos.find(p => Number(p.id) === Number(productoId));
      return producto ? producto.nombre : `Producto #${productoId}`;
    }

    // =========================
    // API
    // =========================
    async function apiFetch(path, options = {}) {
      const response = await fetch(`${API_BASE}${path}`, options);

      let data = null;
      const text = await response.text();

      try {
        data = text ? JSON.parse(text) : null;
      } catch {
        data = text;
      }

      if (!response.ok) {
        const detail =
          (data && data.detail && typeof data.detail === "string" && data.detail) ||
          (typeof data === "string" && data) ||
          `Error ${response.status}`;
        throw new Error(detail);
      }

      return data;
    }

    async function login() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        setStatus("Escribe correo y contraseña.", "error");
        return;
      }

      try {
        setStatus("Entrando...", "info");

        const data = await apiFetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const token = data.access_token || data.token;
        if (!token) {
          throw new Error("El backend no devolvió token.");
        }

        setToken(token);
        toggleApp(true);
        usuarioMovimiento.value = email;

        setStatus("Login correcto.", "ok");
        await cargarTodo();
      } catch (error) {
        clearToken();
        toggleApp(false);
        setStatus(`No se pudo iniciar sesión: ${error.message}`, "error");
      }
    }

    async function cargarProductos() {
      const data = await apiFetch("/productos/", {
        method: "GET",
        headers: authHeaders()
      });

      productos = Array.isArray(data) ? data : [];
      renderProductos();
      renderProductoOptions();
    }

    async function cargarMovimientos() {
      const data = await apiFetch("/movimientos/", {
        method: "GET",
        headers: authHeaders()
      });

      movimientos = Array.isArray(data) ? data : [];
      renderMovimientos();
    }

    async function guardarMovimiento() {
      const producto_id = productoSelect.value;
      const tipo = tipoMovimiento.value;
      const cantidad = Number(cantidadMovimiento.value);
      const usuario = usuarioMovimiento.value.trim();
      const nota = notaMovimiento.value.trim();

      if (!producto_id) {
        setStatus("Selecciona un producto.", "error");
        return;
      }

      if (!cantidad || cantidad <= 0) {
        setStatus("La cantidad debe ser mayor a 0.", "error");
        return;
      }

      if (!usuario) {
        setStatus("Escribe el usuario.", "error");
        return;
      }

      try {
        setStatus("Guardando movimiento...", "info");

        const body = {
          producto_id: Number(producto_id),
          tipo,
          cantidad,
          usuario,
          nota
        };

        await apiFetch("/movimientos/", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify(body)
        });

        cantidadMovimiento.value = "";
        notaMovimiento.value = "";

        setStatus("Movimiento guardado correctamente.", "ok");
        await cargarTodo();
      } catch (error) {
        setStatus(`No se pudo guardar el movimiento: ${error.message}`, "error");
      }
    }

    async function cargarTodo() {
      try {
        setStatus("Cargando productos y movimientos...", "info");
        await Promise.all([cargarProductos(), cargarMovimientos()]);
        setStatus("Datos cargados correctamente.", "ok");
      } catch (error) {
        setStatus(`No se pudieron cargar los datos: ${error.message}`, "error");

        if (
          String(error.message).toLowerCase().includes("not authenticated") ||
          String(error.message).toLowerCase().includes("token") ||
          String(error.message).toLowerCase().includes("credenciales")
        ) {
          clearToken();
          toggleApp(false);
        }
      }
    }

    // =========================
    // RENDER
    // =========================
    function renderProductoOptions() {
      productoSelect.innerHTML = `<option value="">Selecciona un producto</option>`;

      productos.forEach(producto => {
        const option = document.createElement("option");
        option.value = producto.id;
        option.textContent = `${producto.nombre} (Stock: ${producto.cantidad ?? 0})`;
        productoSelect.appendChild(option);
      });
    }

    function renderProductos() {
      if (!productos.length) {
        productosContainer.innerHTML = `<div class="empty">No hay productos para mostrar.</div>`;
        return;
      }

      const rows = productos.map(producto => `
        <tr>
          <td>${producto.id ?? "-"}</td>
          <td>${escapeHtml(producto.nombre ?? "-")}</td>
          <td>${escapeHtml(producto.codigo ?? "-")}</td>
          <td>${escapeHtml(producto.tipo ?? "-")}</td>
          <td>${producto.cantidad ?? 0}</td>
          <td>${escapeHtml(producto.ubicacion ?? "-")}</td>
          <td>${producto.precio ?? "-"}</td>
          <td>${formatDate(producto.created_at)}</td>
        </tr>
      `).join("");

      productosContainer.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Código</th>
              <th>Tipo</th>
              <th>Stock</th>
              <th>Ubicación</th>
              <th>Precio</th>
              <th>Creado</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>
      `;
    }

    function renderMovimientos() {
      if (!movimientos.length) {
        movimientosContainer.innerHTML = `<div class="empty">No hay movimientos para mostrar.</div>`;
        return;
      }

      const rows = movimientos.map(mov => `
        <tr>
          <td>${mov.id ?? "-"}</td>
          <td>${escapeHtml(getProductoNombre(mov.producto_id))}</td>
          <td>
            <span class="pill ${escapeHtml(mov.tipo)}">
              ${escapeHtml((mov.tipo || "").toUpperCase())}
            </span>
          </td>
          <td>${mov.cantidad ?? 0}</td>
          <td>${escapeHtml(mov.usuario ?? "-")}</td>
          <td>${escapeHtml(mov.recibe ?? "-")}</td>
          <td>${escapeHtml(mov.empleado ?? "-")}</td>
          <td>${escapeHtml(mov.nota ?? "-")}</td>
          <td>${formatDate(mov.created_at)}</td>
        </tr>
      `).join("");

      movimientosContainer.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Producto</th>
              <th>Tipo</th>
              <th>Cantidad</th>
              <th>Usuario</th>
              <th>Recibe</th>
              <th>Empleado</th>
              <th>Nota</th>
              <th>Fecha</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>
      `;
    }

    // =========================
    // EVENTOS
    // =========================
    btnLogin.addEventListener("click", login);

    btnLogout.addEventListener("click", () => {
      clearToken();
      toggleApp(false);
      setStatus("Sesión cerrada.", "info");
    });

    btnReload.addEventListener("click", cargarTodo);
    btnGuardarMovimiento.addEventListener("click", guardarMovimiento);

    passwordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });

    emailInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });

    // =========================
    // INIT
    // =========================
    (async function init() {
      const token = getToken();

      if (token) {
        toggleApp(true);
        setStatus("Token encontrado. Cargando datos...", "info");
        await cargarTodo();
      } else {
        toggleApp(false);
        setStatus("Inicia sesión para continuar.", "info");
      }
    })();
  </script>
</body>
</html>
