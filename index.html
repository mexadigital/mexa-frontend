<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mexa Digital | Control ICA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #020617;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #334155;
    }

    h1 { margin: 0; }
    .container { max-width: 1100px; margin: auto; padding: 20px; }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
    }

    input, select { background: #334155; color: white; }

    button { background: #16a34a; color: white; font-weight: bold; }
    .danger { background: red; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border-bottom: 1px solid #334155;
      padding: 8px;
    }

    th { background: #020617; }

    .ok { color: #22c55e; }
    .error { color: #f87171; }
  </style>
</head>

<body>

<header>
  <h1>Mexa Digital</h1>
  <p>Control de materiales ICA</p>
</header>

<div class="container">

  <div class="card">
    <h2>Login</h2>
    <input id="email" placeholder="email">
    <input id="password" type="password" placeholder="password">
    <button onclick="login()">Iniciar sesión</button>
    <p id="loginStatus"></p>
  </div>

  <div class="card">
    <h2>Inventario</h2>
    <button onclick="cargarProductos()">Cargar</button>
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Nombre</th><th>Cantidad</th>
        </tr>
      </thead>
      <tbody id="productosBody"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Movimiento</h2>

    <select id="productoSelect"></select>

    <select id="tipo">
      <option value="salida">Salida</option>
      <option value="entrada">Entrada</option>
    </select>

    <input id="cantidad" placeholder="cantidad">
    <input id="recibe" placeholder="recibe">

    <button onclick="registrarMovimiento()">Registrar</button>
    <p id="movStatus"></p>
  </div>

  <div class="card">
    <h2>Historial</h2>
    <button onclick="cargarMovimientos()">Cargar</button>

    <table>
      <thead>
        <tr>
          <th>Fecha</th><th>Producto</th><th>Tipo</th><th>Cantidad</th><th>Recibe</th>
        </tr>
      </thead>
      <tbody id="movimientosBody"></tbody>
    </table>
  </div>

</div>

<script>
const API_URL = "https://mexa-core-1.onrender.com";

function setStatus(id, msg, type="ok"){
  const el = document.getElementById(id);
  el.innerText = msg;
  el.className = type;
}

function getToken(){
  return localStorage.getItem("token");
}

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{
    const res = await fetch(`${API_URL}/auth/auth/login`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({email, password})
    });

    const data = await res.json();

    if(!res.ok){
      setStatus("loginStatus", data.detail || "error login","error");
      return;
    }

    localStorage.setItem("token", data.access_token);
    setStatus("loginStatus","login correcto");

  }catch(e){
    setStatus("loginStatus","error conexión","error");
  }
}

async function cargarProductos(){
  const token = getToken();

  const res = await fetch(`${API_URL}/productos/`,{
    headers:{Authorization:`Bearer ${token}`}
  });

  const data = await res.json();

  const body = document.getElementById("productosBody");
  const select = document.getElementById("productoSelect");

  body.innerHTML="";
  select.innerHTML="";

  data.forEach(p=>{
    body.innerHTML+=`<tr>
      <td>${p.id}</td>
      <td>${p.nombre}</td>
      <td>${p.cantidad}</td>
    </tr>`;

    select.innerHTML+=`<option value="${p.id}">
      ${p.nombre}
    </option>`;
  });
}

async function registrarMovimiento(){
  const token = getToken();

  const payload = {
    producto_id: Number(document.getElementById("productoSelect").value),
    tipo: document.getElementById("tipo").value,
    cantidad: Number(document.getElementById("cantidad").value),
    recibe: document.getElementById("recibe").value
  };

  const res = await fetch(`${API_URL}/movimientos/`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:`Bearer ${token}`
    },
    body:JSON.stringify(payload)
  });

  const data = await res.json();

  if(!res.ok){
    setStatus("movStatus", data.detail || "error","error");
    return;
  }

  setStatus("movStatus","ok");
  cargarProductos();
  cargarMovimientos();
}

async function cargarMovimientos(){
  const token = getToken();

  const res = await fetch(`${API_URL}/movimientos/`,{
    headers:{Authorization:`Bearer ${token}`}
  });

  const data = await res.json();

  const body = document.getElementById("movimientosBody");
  body.innerHTML="";

  data.forEach(m=>{
    body.innerHTML+=`<tr>
      <td>${m.created_at}</td>
      <td>${m.producto_id}</td>
      <td>${m.tipo}</td>
      <td>${m.cantidad}</td>
      <td>${m.recibe || ""}</td>
    </tr>`;
  });
}
</script>

</body>
</html>
