<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mexa Digital | Control ICA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #020617;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 6px;
      border: none;
    }

    input, select {
      background: #334155;
      color: white;
    }

    button {
      background: #16a34a;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #22c55e;
    }

    .error { color: #f87171; }
    .ok { color: #22c55e; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #334155;
    }

    th {
      background: #020617;
    }
  </style>
</head>

<body>

<header>
  <h1>Mexa Digital</h1>
  <p>Control de materiales | Demo ICA</p>
</header>

<div class="container">

  <!-- LOGIN -->
  <div class="card">
    <h2>Login</h2>
    <input id="email" placeholder="email">
    <input id="password" type="password" placeholder="password">
    <button onclick="login()">Iniciar sesión</button>
    <p id="loginStatus"></p>
  </div>

  <!-- CREAR PRODUCTO -->
  <div class="card">
    <h2>Crear producto</h2>

    <input id="p_nombre" placeholder="Nombre del producto">
    <input id="p_codigo" placeholder="Código">
    <input id="p_tipo" placeholder="Tipo (consumible, EPP, herramienta)">

    <button onclick="crearProducto()">Crear producto</button>

    <p id="prodStatus"></p>
  </div>

  <!-- INVENTARIO -->
  <div class="card">
    <h2>Inventario</h2>
    <button onclick="cargarProductos()">Cargar</button>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Cantidad</th>
        </tr>
      </thead>
      <tbody id="productosBody"></tbody>
    </table>
  </div>

  <!-- MOVIMIENTOS -->
  <div class="card">
    <h2>Movimiento</h2>

    <select id="productoSelect"></select>

    <select id="tipo">
      <option value="entrada">Entrada</option>
      <option value="salida">Salida</option>
    </select>

    <input id="cantidad" placeholder="Cantidad">
    <input id="recibe" placeholder="Recibe">

    <button onclick="registrarMovimiento()">Registrar</button>

    <p id="movStatus"></p>
  </div>

  <!-- HISTORIAL -->
  <div class="card">
    <h2>Historial</h2>
    <button onclick="cargarMovimientos()">Cargar</button>

    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Producto</th>
          <th>Tipo</th>
          <th>Cantidad</th>
          <th>Recibe</th>
        </tr>
      </thead>
      <tbody id="movimientosBody"></tbody>
    </table>
  </div>

</div>

<script>

const API_URL = "https://mexa-core-1.onrender.com";

function setStatus(id, msg, type="ok"){
  const el = document.getElementById(id);
  el.innerText = msg;
  el.className = type;
}

function getToken(){
  return localStorage.getItem("token");
}

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{
    const res = await fetch(`${API_URL}/auth/auth/login`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({email, password})
    });

    const data = await res.json();

    if(!res.ok){
      setStatus("loginStatus", data.detail || "error login","error");
      return;
    }

    localStorage.setItem("token", data.access_token);
    setStatus("loginStatus","login correcto");

  }catch(e){
    setStatus("loginStatus","error conexión","error");
  }
}

async function crearProducto(){
  const token = getToken();

  const payload = {
    nombre: document.getElementById("p_nombre").value,
    codigo: document.getElementById("p_codigo").value,
    tipo: document.getElementById("p_tipo").value
  };

  if(!payload.nombre || !payload.codigo){
    setStatus("prodStatus","Nombre y código obligatorios","error");
    return;
  }

  try{
    const res = await fetch(`${API_URL}/productos/`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization:`Bearer ${token}`
      },
      body:JSON.stringify(payload)
    });

    const data = await res.json();

    if(!res.ok){
      setStatus("prodStatus", data.detail || "error","error");
      return;
    }

    setStatus("prodStatus","Producto creado","ok");

    document.getElementById("p_nombre").value="";
    document.getElementById("p_codigo").value="";
    document.getElementById("p_tipo").value="";

    cargarProductos();

  }catch(e){
    setStatus("prodStatus","error conexión","error");
  }
}

async function cargarProductos(){
  const token = getToken();

  const res = await fetch(`${API_URL}/productos/`,{
    headers:{Authorization:`Bearer ${token}`}
  });

  const data = await res.json();

  const body = document.getElementById("productosBody");
  const select = document.getElementById("productoSelect");

  body.innerHTML="";
  select.innerHTML="";

  data.forEach(p=>{
    body.innerHTML+=`<tr>
      <td>${p.id}</td>
      <td>${p.nombre}</td>
      <td>${p.cantidad ?? 0}</td>
    </tr>`;

    select.innerHTML+=`<option value="${p.id}">
      ${p.nombre}
    </option>`;
  });
}

async function registrarMovimiento(){
  const token = getToken();

  const payload = {
    producto_id: Number(document.getElementById("productoSelect").value),
    tipo: document.getElementById("tipo").value,
    cantidad: Number(document.getElementById("cantidad").value),
    recibe: document.getElementById("recibe").value
  };

  const res = await fetch(`${API_URL}/movimientos/`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:`Bearer ${token}`
    },
    body:JSON.stringify(payload)
  });

  const data = await res.json();

  if(!res.ok){
    setStatus("movStatus", data.detail || "error","error");
    return;
  }

  setStatus("movStatus","Movimiento registrado");

  cargarProductos();
  cargarMovimientos();
}

async function cargarMovimientos(){
  const token = getToken();

  const res = await fetch(`${API_URL}/movimientos/`,{
    headers:{Authorization:`Bearer ${token}`}
  });

  const data = await res.json();

  const body = document.getElementById("movimientosBody");
  body.innerHTML="";

  data.forEach(m=>{
    body.innerHTML+=`<tr>
      <td>${m.created_at}</td>
      <td>${m.producto_id}</td>
      <td>${m.tipo}</td>
      <td>${m.cantidad}</td>
      <td>${m.recibe || ""}</td>
    </tr>`;
  });
}

</script>

</body>
</html>
