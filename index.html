<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mexa Digital</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px}
.container{max-width:1000px;margin:auto}
.card{background:#1e293b;padding:20px;border-radius:10px;margin-bottom:20px}
input,select{padding:10px;margin:5px;border-radius:6px;border:none}
button{padding:10px;border:none;border-radius:6px;background:#38bdf8;color:black;margin:5px}
.logout{background:#f87171}
.item{border-bottom:1px solid #334155;padding:10px}
.ok{color:#4ade80}
.error{color:#f87171}
.small{color:#94a3b8}
</style>

</head>

<body>

<div class="container">

<div class="card">
<h1>Mexa Digital</h1>
<p id="usuarioInfo"></p>
<button id="logoutBtn" class="logout" onclick="logout()" style="display:none;">Cerrar sesión</button>
</div>

<div class="card" id="loginCard">
<h2>Login</h2>
<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">
<button onclick="login()">Entrar</button>
<p id="loginStatus"></p>
</div>

<!-- 🔥 UBICACIONES -->
<div class="card">
<h2>📍 Ubicaciones</h2>

<p class="small">Estás creando una nueva ubicación</p>

<input id="ubicacion_nombre" placeholder="Ej: Nave 12, Contenedor A">

<select id="ubicacion_tipo">
<option value="">Selecciona tipo</option>
<option value="contenedor">Contenedor</option>
<option value="nave">Nave</option>
<option value="almacen_abierto">Almacén a cielo abierto</option>
<option value="bodega">Bodega</option>
<option value="patio">Patio</option>
</select>

<br>

<button onclick="crearUbicacion(event)">Crear ubicación</button>
<button onclick="cargarUbicaciones()">Actualizar</button>

<p id="ubicacionStatus"></p>

<div id="listaUbicaciones"></div>
</div>

</div>

<script>

const API="https://mexa-core-1.onrender.com";
const LOGIN_URL=`${API}/auth/auth/login`;
const UBICACIONES_URL=`${API}/ubicaciones/ubicaciones/`;

let token=localStorage.getItem("mexa_token")||"";
let usuario=localStorage.getItem("mexa_usuario")||"";

function mostrarSesion(){
 if(token){
  usuarioInfo.innerText="Usuario: "+usuario;
  loginCard.style.display="none";
  logoutBtn.style.display="block";
 }else{
  loginCard.style.display="block";
  logoutBtn.style.display="none";
 }
}

function logout(){
 localStorage.clear();
 location.reload();
}

async function login(){
 const email=document.getElementById("email").value;
 const password=document.getElementById("password").value;

 loginStatus.innerText="Entrando...";

 const res=await fetch(LOGIN_URL,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({email,password})
 });

 const data=await res.json();

 if(!res.ok){
  loginStatus.innerText=JSON.stringify(data);
  loginStatus.className="error";
  return;
 }

 token=data.access_token;
 usuario=email;

 localStorage.setItem("mexa_token",token);
 localStorage.setItem("mexa_usuario",usuario);

 mostrarSesion();
 cargarUbicaciones();
}

async function cargarUbicaciones(){
 if(!token) return;

 const res=await fetch(UBICACIONES_URL,{
  headers:{Authorization:"Bearer "+token}
 });

 const data=await res.json();

 if(!res.ok){
  ubicacionStatus.innerText=JSON.stringify(data);
  return;
 }

 const lista=Array.isArray(data)?data:(data.items||data.data||[]);

 listaUbicaciones.innerHTML="";

 lista.forEach(u=>{
  listaUbicaciones.innerHTML+=`
  <div class="item">
   ${u.nombre} (${u.tipo})
  </div>`;
 });
}

async function crearUbicacion(event){

 const btn=event.target;
 btn.disabled=true;

 const nombre=document.getElementById("ubicacion_nombre").value;
 const tipo=document.getElementById("ubicacion_tipo").value;

 if(!nombre || !tipo){
  alert("Completa los campos");
  btn.disabled=false;
  return;
 }

 const res=await fetch(UBICACIONES_URL,{
  method:"POST",
  headers:{
   "Content-Type":"application/json",
   Authorization:"Bearer "+token
  },
  body:JSON.stringify({
   organizacion_id:8,
   nombre,
   tipo
  })
 });

 const data=await res.json();

 if(!res.ok){
  ubicacionStatus.innerText=JSON.stringify(data);
  ubicacionStatus.className="error";
  btn.disabled=false;
  return;
 }

 ubicacionStatus.innerText="✔ Ubicación creada";
 ubicacionStatus.className="ok";

 btn.disabled=false;

 cargarUbicaciones();
}

window.onload=()=>{
 mostrarSesion();
 if(token) cargarUbicaciones();
};

</script>

</body>
</html>
