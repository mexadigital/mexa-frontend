<script>
const API="https://mexa-core-1.onrender.com";

function tokenActual(){
  return localStorage.getItem("token") || localStorage.getItem("mexa_token") || "";
}

function guardarToken(token){
  localStorage.setItem("token", token);
  localStorage.setItem("mexa_token", token);
}

function headers(){
  return {
    "Content-Type":"application/json",
    "Authorization":"Bearer "+tokenActual()
  };
}

async function login(){
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value.trim();

  document.getElementById("msg").innerText="Entrando...";

  const rutas=["/auth/login","/auth/auth/login"];

  for(let r of rutas){
    try{
      let res=await fetch(API+r,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email,password})
      });

      let data=await res.json();

      if(res.ok && data.access_token){
        guardarToken(data.access_token);
        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        await cargarTodo();
        return;
      }
    }catch(e){}
  }

  document.getElementById("msg").innerText="Error login";
  alert("Error login");
}

function cerrarSesion(){
  localStorage.removeItem("token");
  localStorage.removeItem("mexa_token");
  location.reload();
}
</script>
