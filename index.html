<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mexa Digital</title>

  <style>
    :root {
      --bg:#0f172a; --card:#111827; --card2:#1f2937;
      --text:#f9fafb; --muted:#9ca3af;
      --blue:#2563eb; --green:#16a34a; --red:#dc2626;
      --border:#374151;
    }

    *{box-sizing:border-box;}
    body{margin:0;font-family:Arial;background:var(--bg);color:var(--text);}

    header{
      padding:20px;background:#020617;border-bottom:1px solid var(--border);
      display:flex;justify-content:space-between;align-items:center;
    }

    button{
      border:none;border-radius:10px;padding:10px 14px;
      background:var(--blue);color:white;cursor:pointer;font-weight:bold;
    }

    .danger{background:var(--red);}
    .success{background:var(--green);}

    .container{max-width:1200px;margin:auto;padding:20px;}

    .login-box{
      max-width:420px;margin:80px auto;background:var(--card);
      padding:25px;border-radius:18px;border:1px solid var(--border);
    }

    input,select,textarea{
      width:100%;margin:8px 0 14px;padding:12px;
      border-radius:10px;border:1px solid var(--border);
      background:#020617;color:white;
    }

    .grid{
      display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;
    }

    .card{
      background:var(--card);border:1px solid var(--border);
      border-radius:18px;padding:18px;
    }

    .location-card{cursor:pointer;}
    .location-card:hover{border-color:var(--blue);}

    .hidden{display:none;}
  </style>
</head>

<body>

<header>
  <h2>Mexa Digital</h2>
  <div>
    <button onclick="cargarTodo()">Actualizar</button>
    <button class="danger" onclick="cerrarSesion()">Cerrar sesión</button>
  </div>
</header>

<div id="login" class="login-box">
  <h2>Iniciar sesión</h2>

  <input id="email" placeholder="Correo" />
  <input id="password" type="password" placeholder="Contraseña" />

  <button onclick="login()">Entrar</button>
  <p id="loginMsg"></p>
</div>

<div id="app" class="container hidden">

  <h2>Ubicaciones</h2>
  <div id="ubicacionesGrid" class="grid"></div>

  <h3>Crear ubicación</h3>
  <input id="ubicacionNombre" placeholder="Nombre"/>
  <input id="ubicacionResponsable" placeholder="Responsable"/>
  <button onclick="crearUbicacion()">Guardar</button>

  <h3>Crear producto</h3>
  <input id="productoNombre" placeholder="Nombre"/>
  <input id="productoCodigo" placeholder="Código"/>
  <input id="productoCantidad" type="number"/>
  <select id="productoUbicacion"></select>
  <button onclick="crearProducto()">Guardar</button>

</div>

<script>
const API = "https://mexa-core-1.onrender.com";

function token(){return localStorage.getItem("mexa_token");}

function headers(){
  return {
    "Content-Type":"application/json",
    "Authorization":"Bearer "+token()
  };
}

async function login(){
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value.trim();
  const msg=document.getElementById("loginMsg");

  msg.textContent="Entrando...";

  const urls=[
    `${API}/auth/login`,
    `${API}/auth/auth/login`
  ];

  for(let url of urls){
    try{
      const res=await fetch(url,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email,password})
      });

      const data=await res.json();

      if(res.ok && data.access_token){
        localStorage.setItem("mexa_token",data.access_token);
        mostrarApp();
        cargarTodo();
        msg.textContent="Login correcto";
        return;
      }

    }catch(e){}
  }

  msg.textContent="Login incorrecto";
}

function mostrarApp(){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

function cerrarSesion(){
  localStorage.removeItem("mexa_token");
  location.reload();
}

async function cargarTodo(){
  const res=await fetch(`${API}/ubicaciones/ubicaciones/`,{headers:headers()});
  const data=await res.json();

  const grid=document.getElementById("ubicacionesGrid");
  const select=document.getElementById("productoUbicacion");

  grid.innerHTML="";
  select.innerHTML="";

  data.forEach(u=>{
    grid.innerHTML+=`
      <div class="card location-card">
        <h3>${u.nombre}</h3>
        <p>${u.tipo}</p>
      </div>
    `;

    select.innerHTML+=`<option>${u.nombre}</option>`;
  });
}

async function crearUbicacion(){
  const nombre=document.getElementById("ubicacionNombre").value;
  const responsable=document.getElementById("ubicacionResponsable").value;

  await fetch(`${API}/ubicaciones/ubicaciones/`,{
    method:"POST",
    headers:headers(),
    body:JSON.stringify({nombre,tipo:"contenedor",responsable})
  });

  cargarTodo();
}

async function crearProducto(){
  const nombre=document.getElementById("productoNombre").value;
  const codigo=document.getElementById("productoCodigo").value;
  const cantidad=Number(document.getElementById("productoCantidad").value);
  const ubicacion=document.getElementById("productoUbicacion").value;

  await fetch(`${API}/productos/`,{
    method:"POST",
    headers:headers(),
    body:JSON.stringify({nombre,codigo,cantidad,ubicacion})
  });

  cargarTodo();
}

if(token()){
  mostrarApp();
  cargarTodo();
}
</script>

</body>
</html>
