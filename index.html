<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mexa Digital</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header {
  padding:16px;
  background:#020617;
  display:flex;
  justify-content:space-between;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:6px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  font-size:14px;
}

.danger { background:red; }

.container {
  max-width:600px;
  margin:auto;
  padding:16px;
}

.card {
  background:#111827;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:8px;
}

input, select {
  width:100%;
  padding:6px;
  margin:4px 0;
  background:#020617;
  color:white;
  border:1px solid #374151;
  border-radius:6px;
  font-size:14px;
}

.hidden { display:none; }

#login {
  max-width:400px;
  margin:80px auto;
}
</style>
</head>

<body>

<header>
  <h2>Mexa Digital</h2>
  <div>
    <button onclick="cargarTodo()">Actualizar</button>
    <button class="danger" onclick="cerrarSesion()">Salir</button>
  </div>
</header>

<div id="login" class="container">
  <h2>Login</h2>
  <input id="email" value="admin.ica@mexa.com">
  <input id="password" type="password" value="123456">
  <button onclick="login()">Entrar</button>
  <p id="msg"></p>
</div>

<div id="app" class="container hidden">

  <h3>Ubicaciones</h3>
  <div id="grid" class="grid"></div>

  <h3>Crear ubicación</h3>
  <input id="uNombre" placeholder="Nombre">
  <input id="uResp" placeholder="Responsable">
  <button onclick="crearUbicacion()">Guardar</button>

  <h3>Crear producto</h3>
  <input id="pNombre" placeholder="Nombre">
  <input id="pCodigo" placeholder="Código">
  <input id="pCant" type="number">
  <select id="pUbicacion"></select>
  <button onclick="crearProducto()">Guardar</button>

  <h3>Productos</h3>
  <div id="productos"></div>

</div>

<script>
const API="https://mexa-core-1.onrender.com";

function headers(){
  return {
    "Content-Type":"application/json",
    "Authorization":"Bearer "+localStorage.getItem("token")
  };
}

async function login(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  document.getElementById("msg").innerText="Entrando...";

  const rutas=["/auth/login","/auth/auth/login"];

  for(let r of rutas){
    try{
      let res=await fetch(API+r,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email,password})
      });

      let data=await res.json();

      if(res.ok){
        localStorage.setItem("token",data.access_token);
        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        cargarTodo();
        return;
      }
    }catch{}
  }

  document.getElementById("msg").innerText="Error login";
}

function cerrarSesion(){
  localStorage.removeItem("token");
  location.reload();
}

async function cargarTodo(){

  let ubicaciones=[];
  let productos=[];

  try{
    let resU=await fetch(API+"/ubicaciones/ubicaciones/",{headers:headers()});
    ubicaciones=await resU.json();
  }catch{}

  try{
    let resP=await fetch(API+"/productos/",{headers:headers()});
    let data=await resP.json();

    // 🔥 FIX IMPORTANTE
    if(Array.isArray(data)){
      productos=data;
    } else if(data.items){
      productos=data.items;
    } else {
      productos=[];
    }

  }catch{}

  // 🔹 Render ubicaciones
  let grid=document.getElementById("grid");
  let select=document.getElementById("pUbicacion");

  grid.innerHTML="";
  select.innerHTML="";

  ubicaciones.forEach(u=>{
    grid.innerHTML+=`
      <div class="card">
        <b>${u.nombre}</b><br>
        ${u.tipo}
      </div>
    `;
    select.innerHTML+=`<option>${u.nombre}</option>`;
  });

  // 🔹 Render productos
  let div=document.getElementById("productos");

  if(productos.length===0){
    div.innerHTML="<p>No hay productos aún</p>";
    return;
  }

  div.innerHTML=productos.map(p=>`
    <div class="card">
      <b>${p.nombre}</b><br>
      Código: ${p.codigo}<br>
      Ubicación: ${p.ubicacion || "Sin ubicación"}<br>
      Stock: ${p.cantidad}
    </div>
  `).join("");
}

async function crearUbicacion(){
  let nombre=document.getElementById("uNombre").value;

  await fetch(API+"/ubicaciones/ubicaciones/",{
    method:"POST",
    headers:headers(),
    body:JSON.stringify({nombre,tipo:"contenedor"})
  });

  cargarTodo();
}

async function crearProducto(){

  let body={
    nombre:document.getElementById("pNombre").value,
    codigo:document.getElementById("pCodigo").value,
    cantidad:Number(document.getElementById("pCant").value),
    ubicacion:document.getElementById("pUbicacion").value
  };

  let res=await fetch(API+"/productos/",{
    method:"POST",
    headers:headers(),
    body:JSON.stringify(body)
  });

  let txt=await res.text();

  if(!res.ok){
    alert("Error:\n"+txt);
  }else{
    alert("Producto creado");
    cargarTodo();
  }
}

if(localStorage.getItem("token")){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  cargarTodo();
}
</script>

</body>
</html>
