<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mexa Digital - Control</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1, h2 {
      color: #38bdf8;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #38bdf8;
      color: #020617;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #020617;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    .ok {
      color: #22c55e;
    }

    .error {
      color: #ef4444;
    }
  </style>
</head>

<body>

  <h1>Mexa Digital</h1>
  <p>Control de inventario básico</p>

  <div class="card">
    <h2>Login</h2>
    <input id="email" type="email" placeholder="Correo" />
    <input id="password" type="password" placeholder="Contraseña" />
    <button onclick="login()">Entrar</button>
    <p id="loginMsg"></p>
  </div>

  <div class="card">
    <h2>Crear producto</h2>
    <input id="nombreProducto" placeholder="Nombre del producto" />
    <input id="codigoProducto" placeholder="Código / clave" />
    <input id="tipoProducto" placeholder="Tipo: consumible, herramienta, epp" />
    <input id="cantidadProducto" type="number" placeholder="Cantidad inicial" />
    <input id="ubicacionProducto" placeholder="Ubicación: Nave 12, almacén, sucursal" />
    <button onclick="crearProducto()">Guardar producto</button>
    <p id="productoMsg"></p>
  </div>

  <div class="card">
    <h2>Productos</h2>
    <button onclick="cargarProductos()">Cargar productos</button>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Código</th>
          <th>Cantidad</th>
          <th>Ubicación</th>
        </tr>
      </thead>
      <tbody id="tablaProductos"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Movimiento</h2>
    <input id="productoIdMov" type="number" placeholder="ID del producto" />
    <select id="tipoMovimiento">
      <option value="entrada">Entrada</option>
      <option value="salida">Salida</option>
    </select>
    <input id="cantidadMovimiento" type="number" placeholder="Cantidad" />
    <input id="recibeMovimiento" placeholder="Quién recibe / entrega" />
    <input id="empleadoMovimiento" placeholder="Empleado" />
    <input id="notaMovimiento" placeholder="Nota" />
    <button onclick="crearMovimiento()">Guardar movimiento</button>
    <p id="movimientoMsg"></p>
  </div>

  <script>
    const API_URL = "https://mexa-core-1.onrender.com";

    function getToken() {
      return localStorage.getItem("mexa_token");
    }

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email: email,
            password: password
          })
        });
