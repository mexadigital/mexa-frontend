<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mexa Digital</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

h1, h2 {
  color: #38bdf8;
}

input, select {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 6px;
  background: #38bdf8;
  color: black;
  cursor: pointer;
  font-weight: bold;
  margin: 5px;
}

button:hover {
  background: #0ea5e9;
}

.logout {
  background: #f87171;
}

.logout:hover {
  background: #ef4444;
}

.producto, .movimiento, .ubicacion {
  padding: 12px;
  border-bottom: 1px solid #334155;
}

.producto strong {
  color: #facc15;
}

.ok {
  color: #4ade80;
}

.error {
  color: #f87171;
}

.small {
  color: #94a3b8;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h1>Mexa Digital</h1>
    <p class="small">Control de productos, ubicaciones, entradas, salidas e historial.</p>
    <p id="usuarioInfo" class="ok"></p>
    <button id="logoutBtn" class="logout" onclick="logout()" style="display:none;">Cerrar sesión</button>
  </div>

  <div class="card" id="loginCard">
    <h2>🔐 Login</h2>
    <input id="email" placeholder="email">
    <input id="password" type="password" placeholder="password">
    <button onclick="login()">Entrar</button>
    <p id="loginStatus"></p>
  </div>

  <div class="card">
    <h2>📍 Ubicaciones</h2>
    <input id="ubicacion_nombre" placeholder="Nombre ubicación">
    <input id="ubicacion_tipo" placeholder="Tipo: almacen, contenedor, patio">
    <button onclick="crearUbicacion()">Crear ubicación</button>
    <button onclick="cargarUbicaciones()">Actualizar ubicaciones</button>
    <p id="ubicacionStatus"></p>
    <div id="listaUbicaciones"></div>
  </div>

  <div class="card">
    <h2>📦 Productos</h2>
    <button onclick="cargarProductos()">Actualizar productos</button>
    <p id="productosStatus"></p>
    <div id="listaProductos"></div>
  </div>

  <div class="card">
    <h2>➕ Crear Producto</h2>
    <input id="nombre" placeholder="Nombre">
    <input id="codigo" placeholder="Código">
    <input id="tipo" placeholder="Tipo: consumible, herramienta, epp">
    <button onclick="crearProducto()">Crear producto</button>
    <p class="small">Después de crear el producto, registra una entrada para agregar stock.</p>
    <p id="productoStatus"></p>
  </div>

  <div class="card">
    <h2>📥 Registrar entrada</h2>
    <input id="producto_id_entrada" type="number" placeholder="ID Producto">
    <input id="cantidad_entrada" type="number" placeholder="Cantidad">
    <select id="ubicacion_entrada">
      <option value="">Selecciona ubicación</option>
    </select>
    <input id="recibe_entrada" placeholder="Quién recibe / entrega">
    <input id="empleado_entrada" placeholder="Empleado / ficha">
    <input id="nota_entrada" placeholder="Nota">
    <button onclick="entrada()">Entrada</button>
    <p id="entradaStatus"></p>
  </div>

  <div class="card">
    <h2>📤 Registrar salida</h2>
    <input id="producto_id_salida" type="number" placeholder="ID Producto">
    <input id="cantidad_salida" type="number" placeholder="Cantidad">
    <select id="ubicacion_salida">
      <option value="">Selecciona ubicación</option>
    </select>
    <input id="recibe_salida" placeholder="Quién recibe">
    <input id="empleado_salida" placeholder="Empleado / ficha">
    <input id="nota_salida" placeholder="Nota">
    <button onclick="salida()">Salida</button>
    <p id="salidaStatus"></p>
  </div>

  <div class="card">
    <h2>📜 Historial de movimientos</h2>
    <button onclick="cargarMovimientos()">Actualizar historial</button>
    <p id="movimientosStatus"></p>
    <div id="listaMovimientos"></div>
  </div>

</div>

<script>
const API = "https://mexa-core-1.onrender.com";

const LOGIN_URL = `${API}/auth/auth/login`;
const UBICACIONES_URL = `${API}/ubicaciones/ubicaciones/`;
const PRODUCTOS_URL = `${API}/productos/productos/`;
const MOVIMIENTOS_URL = `${API}/movimientos/movimientos/`;

let token = localStorage.getItem("mexa_token") || "";
let usuario = localStorage.getItem("mexa_usuario") || "";

function normalizarLista(data) {
  if (Array.isArray(data)) return data;
  if (data && Array.isArray(data.items)) return data.items;
  if (data && Array.isArray(data.results)) return data.results;
  if (data && Array.isArray(data.data)) return data.data;
  return [];
}

function mostrarSesion() {
  if (token && usuario) {
    document.getElementById("usuarioInfo").innerText = "👤 Usuario: " + usuario;
    document.getElementById("logoutBtn").style.display = "inline-block";
    document.getElementById("loginCard").style.display = "none";
  } else {
    document.getElementById("usuarioInfo").innerText = "";
    document.getElementById("logoutBtn").style.display = "none";
    document.getElementById("loginCard").style.display = "block";
  }
}

function logout() {
  localStorage.removeItem("mexa_token");
  localStorage.removeItem("mexa_usuario");
  token = "";
  usuario = "";

  document.getElementById("listaProductos").innerHTML = "";
  document.getElementById("listaMovimientos").innerHTML = "";
  document.getElementById("listaUbicaciones").innerHTML = "";

  mostrarSesion();
}

async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  document.getElementById("loginStatus").innerText = "Entrando...";
  document.getElementById("loginStatus").className = "";

  try {
    const res = await fetch(LOGIN_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      document.getElementById("loginStatus").innerText = "❌ Error: " + JSON.stringify(data);
      document.getElementById("loginStatus").className = "error";
      return;
    }

    token = data.access_token;
    usuario = email;

    localStorage.setItem("mexa_token", token);
    localStorage.setItem("mexa_usuario", usuario);

    document.getElementById("email").value = "";
    document.getElementById("password").value = "";
    document.getElementById("loginStatus").innerText = "✔ Login correcto";
    document.getElementById("loginStatus").className = "ok";

    mostrarSesion();
    await cargarTodo();

  } catch (error) {
    document.getElementById("loginStatus").innerText = "❌ Error de conexión: " + error.message;
    document.getElementById("loginStatus").className = "error";
  }
}

async function cargarTodo() {
  await cargarUbicaciones();
  await cargarProductos();
  await cargarMovimientos();
}

async function cargarUbicaciones() {
  if (!token) return;

  try {
    const res = await fetch(UBICACIONES_URL, {
      headers: { "Authorization": "Bearer " + token }
    });

    const data = await res.json();
    console.log("UBICACIONES:", data);

    if (!res.ok) {
      document.getElementById("ubicacionStatus").innerText = "❌ Error: " + JSON.stringify(data);
      document.getElementById("ubicacionStatus").className = "error";
      return;
    }

    const ubicaciones = normalizarLista(data);

    const lista = document.getElementById("listaUbicaciones");
    const selectEntrada = document.getElementById("ubicacion_entrada");
    const selectSalida = document.getElementById("ubicacion_salida");

    lista.innerHTML = "";
    selectEntrada.innerHTML = `<option value="">Selecciona ubicación</option>`;
    selectSalida.innerHTML = `<option value="">Selecciona ubicación</option>`;

    if (ubicaciones.length === 0) {
      lista.innerHTML = `<p class="small">No hay ubicaciones registradas.</p>`;
      return;
    }

    ubicaciones.sort((a, b) => (b.id || 0) - (a.id || 0)).forEach(u => {
      const div = document.createElement("div");
      div.className = "ubicacion";
      div.innerHTML = `
        📍 <strong>${u.nombre || "Sin nombre"}</strong><br>
        ID: ${u.id || "N/A"} | Tipo: ${u.tipo || "N/A"} | Activo: ${u.activo ? "Sí" : "No"}
      `;
      lista.appendChild(div);

      const optionEntrada = document.createElement("option");
      optionEntrada.value = u.nombre;
      optionEntrada.textContent = u.nombre;

      const optionSalida = document.createElement("option");
      optionSalida.value = u.nombre;
      optionSalida.textContent = u.nombre;

      selectEntrada.appendChild(optionEntrada);
      selectSalida.appendChild(optionSalida);
    });

    document.getElementById("ubicacionStatus").innerText = "✔ Ubicaciones cargadas: " + ubicaciones.length;
    document.getElementById("ubicacionStatus").className = "ok";

  } catch (error) {
    document.getElementById("ubicacionStatus").innerText = "❌ Error de conexión: " + error.message;
    document.getElementById("ubicacionStatus").className = "error";
  }
}

async function crearUbicacion() {
  const nombre = document.getElementById("ubicacion_nombre").value.trim();
  const tipo = document.getElementById("ubicacion_tipo").value.trim();

  if (!token) {
    alert("Primero inicia sesión");
    return;
  }

  if (!nombre || !tipo) {
    alert("Faltan datos de la ubicación");
    return;
  }

  try {
    const res = await fetch(UBICACIONES_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ nombre, tipo })
    });

    const data = await res.json();

    if (!res.ok) {
      document.getElementById("ubicacionStatus").innerText = "❌ Error: " + JSON.stringify(data);
      document.getElementById("ubicacionStatus").className = "error";
      return;
    }

    document.getElementById("ubicacion_nombre").value = "";
    document.getElementById("ubicacion_tipo").value = "";

    document.getElementById("ubicacionStatus").innerText = "✔ Ubicación creada";
    document.getElementById("ubicacionStatus").className = "ok";

    await cargarUbicaciones();

  } catch (error) {
    document.getElementById("ubicacionStatus").innerText = "❌ Error de conexión: " + error.message;
    document.getElementById("ubicacionStatus").className = "error";
  }
}

async function cargarProductos() {
  if (!token) return;

  try {
    const res = await fetch(PRODUCTOS_URL, {
      headers: { "Authorization": "Bearer " + token }
    });

    const data = await res.json();
    console.log("PRODUCTOS:", data);

    if (!res.ok) {
      document.getElementById("productosStatus").innerText = "❌ Error: " + JSON.stringify(data);
      document.getElementById("productosStatus").className = "error";
      return;
    }

    const productos = normalizarLista(data);
    const lista = document.getElementById("listaProductos");
    lista.innerHTML = "";

    if (productos.length === 0) {
      lista.innerHTML = `<p class="small">No hay productos registrados.</p>`;
      return;
    }

    productos.sort((a, b) => (b.id || 0) - (a.id || 0)).forEach(p => {
      const div = document.createElement("div");
      div.className = "producto";
      div.innerHTML = `
        <strong>${p.nombre || "Sin nombre"}</strong><br>
        ID: ${p.id || "N/A"} | Código: ${p.codigo || "Sin código"}<br>
        Tipo: ${p.tipo || "N/A"} | Stock: <strong>${p.cantidad ?? 0}</strong><br>
        Ubicación: ${p.ubicacion || "Sin ubicación"} | Precio: ${p.precio ?? "N/A"}
      `;
      lista.appendChild(div);
    });

    document.getElementById("productosStatus").innerText = "✔ Productos cargados: " + productos.length;
    document.getElementById("productosStatus").className = "ok";

  } catch (error) {
    document.getElementById("productosStatus").innerText = "❌ Error de conexión: " + error.message;
    document.getElementById("productosStatus").className = "error";
  }
}

async function crearProducto() {
  const nombre = document.getElementById("nombre").value.trim();
  const codigo = document.getElementById("codigo").value.trim();
  const tipo = document.getElementById("tipo").value.trim();

  if (!token) {
    alert("Primero inicia sesión");
    return;
  }

  if (!nombre || !codigo || !tipo) {
    alert("Faltan datos del producto");
    return;
  }

  try {
    const res = await fetch(PRODUCTOS_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ nombre, codigo, tipo })
    });

    const data = await res.json();

    if (!res.ok) {
      document.getElementById("productoStatus").innerText = "❌ Error: " + JSON.stringify(data);
      document.getElementById("productoStatus").className = "error";
      return;
    }

    document.getElementById("nombre").value = "";
    document.getElementById("codigo").value = "";
    document.getElementById("tipo").value = "";

    document.getElementById("productoStatus").innerText = "✔ Producto creado. Ahora registra una entrada para agregar stock.";
    document.getElementById("productoStatus").className = "ok";

    await cargarProductos();

  } catch (error) {
    document.getElementById("productoStatus").innerText = "❌ Error de conexión: " + error.message;
    document.getElementById("productoStatus").className = "error";
  }
}

async function entrada() {
  const producto_id = parseInt(document.getElementById("producto_id_entrada").value);
  const cantidad = parseInt(document.getElementById("cantidad_entrada").value);
  const ubicacion = document.getElementById("ubicacion_entrada").value;
  const recibe = document.getElementById("recibe_entrada").value.trim() || null;
  const empleado = document.getElementById("empleado_entrada").value.trim() || null;
  let nota = document.getElementById("nota_entrada").value.trim() || "";

  if (!token) {
    alert("Primero inicia sesión");
    return;
  }

  if (!producto_id || !cantidad) {
    alert("Faltan datos para la entrada");
    return;
  }

  if (ubicacion) nota = `[Ubicación: ${ubicacion}] ` + nota;

  try {
    const res = await fetch(MOVIMIENTOS_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        producto_id,
        tipo: "entrada",
        cantidad,
        usuario: usuario || "admin@mexa.com",
        recibe,
        empleado,
        nota
      })
    });

    const data = await res.json();

    if (!res.ok) {
      document.getElementById("entradaStatus").innerText = "❌ Error: " + JSON.stringify(data);
      document.getElementById("entradaStatus").className = "error";
      return;
    }

    document.getElementById("producto_id_entrada").value = "";
    document.getElementById("cantidad_entrada").value = "";
    document.getElementById("ubicacion_entrada").value = "";
    document.getElementById("recibe_entrada").value = "";
    document.getElementById("empleado_entrada").value = "";
    document.getElementById("nota_entrada").value = "";

    document.getElementById("entradaStatus").innerText = "✔ Entrada registrada";
    document.getElementById("entradaStatus").className = "ok";

    await cargarProductos();
    await cargarMovimientos();

  } catch (error) {
    document.getElementById("entradaStatus").innerText = "❌ Error de conexión: " + error.message;
    document.getElementById("entradaStatus").className = "error";
  }
}

async function salida() {
  const producto_id = parseInt(document.getElementById("producto_id_salida").value);
  const cantidad = parseInt(document.getElementById("cantidad_salida").value);
  const ubicacion = document.getElementById("ubicacion_salida").value;
  const recibe = document.getElementById("recibe_salida").value.trim() || null;
  const empleado = document.getElementById("empleado_salida").value.trim() || null;
  let nota = document.getElementById("nota_salida").value.trim() || "";

  if (!token) {
    alert("Primero inicia sesión");
    return;
  }

  if (!producto_id || !cantidad) {
    alert("Faltan datos para la salida");
    return;
  }

  if (ubicacion) nota = `[Ubicación: ${ubicacion}] ` + nota;

  try {
    const res = await fetch(MOVIMIENTOS_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        producto_id,
        tipo: "salida",
        cantidad,
        usuario: usuario || "admin@mexa.com",
        recibe,
        empleado,
        nota
      })
    });

    const data = await res.json();

    if (!res.ok) {
      document.getElementById("salidaStatus").innerText = "❌ Error: " + JSON.stringify(data);
      document.getElementById("salidaStatus").className = "error";
      return;
    }

    document.getElementById("producto_id_salida").value = "";
    document.getElementById("cantidad_salida").value = "";
    document.getElementById("ubicacion_salida").value = "";
    document.getElementById("recibe_salida").value = "";
    document.getElementById("empleado_salida").value = "";
    document.getElementById("nota_salida").value = "";

    document.getElementById("salidaStatus").innerText = "✔ Salida registrada";
    document.getElementById("salidaStatus").className = "ok";

    await cargarProductos();
    await cargarMovimientos();

  } catch (error) {
    document.getElementById("salidaStatus").innerText = "❌ Error de conexión: " + error.message;
    document.getElementById("salidaStatus").className = "error";
  }
}

async function cargarMovimientos() {
  if (!token) return;

  try {
    const res = await fetch(MOVIMIENTOS_URL, {
      headers: { "Authorization": "Bearer " + token }
    });

    const data = await res.json();
    console.log("MOVIMIENTOS:", data);

    if (!res.ok) {
      document.getElementById("movimientosStatus").innerText = "❌ Error: " + JSON.stringify(data);
      document.getElementById("movimientosStatus").className = "error";
      return;
    }

    const movimientos = normalizarLista(data);
    const lista = document.getElementById("listaMovimientos");
    lista.innerHTML = "";

    if (movimientos.length === 0) {
      lista.innerHTML = `<p class="small">No hay movimientos registrados.</p>`;
      return;
    }

    movimientos.slice(0, 20).forEach(m => {
      const div = document.createElement("div");
      div.className = "movimiento";
      const icono = m.tipo === "entrada" ? "📥" : "📤";

      div.innerHTML = `
        ${icono} <strong>${(m.tipo || "movimiento").toUpperCase()}</strong> | Producto: ${m.producto || m.producto_id || "N/A"}<br>
        Cantidad: ${m.cantidad || 0} | Usuario: ${m.usuario || "N/A"}<br>
        Recibe: ${m.recibe || "N/A"} | Empleado: ${m.empleado || "N/A"}<br>
        Nota: ${m.nota || "Sin nota"}<br>
        <span class="small">${m.created_at || ""}</span>
      `;

      lista.appendChild(div);
    });

    document.getElementById("movimientosStatus").innerText = "✔ Movimientos cargados: " + movimientos.length;
    document.getElementById("movimientosStatus").className = "ok";

  } catch (error) {
    document.getElementById("movimientosStatus").innerText = "❌ Error de conexión: " + error.message;
    document.getElementById("movimientosStatus").className = "error";
  }
}

window.onload = async () => {
  mostrarSesion();
  if (token) await cargarTodo();
};
</script>

</body>
</html>
