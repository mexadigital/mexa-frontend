<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mexa Digital</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 10px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

button {
  padding: 12px;
  border-radius: 8px;
  border: none;
  width: 100%;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: none;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
</style>
</head>

<body>

<h2>Mexa Digital</h2>

<!-- LOGIN -->
<div class="card" id="loginBox">
  <h3>Login</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Entrar</button>
</div>

<!-- PANEL -->
<div class="card" id="panel" style="display:none;">
  <h3>Panel</h3>

  <div class="grid">
    <button onclick="show('productos')">📦 Productos</button>
    <button onclick="show('entradas')">📥 Entradas</button>
    <button onclick="show('traspasos')">🔄 Traspasos</button>
    <button onclick="show('requisiciones')">📋 Requisiciones</button>
    <button onclick="show('inventario')">📊 Inventario</button>
    <button onclick="show('ubicaciones')">📍 Ubicaciones</button>
    <button onclick="logout()" style="background:red;color:white;">🚪 Salir</button>
  </div>
</div>

<!-- PRODUCTOS -->
<div class="card" id="productos" style="display:none;">
  <h3>Productos</h3>
  <button onclick="getProductos()">Cargar</button>
  <pre id="productosOut"></pre>
</div>

<!-- ENTRADAS -->
<div class="card" id="entradas" style="display:none;">
  <h3>📥 Entrada de Material</h3>

  <input id="orden_compra" placeholder="Orden de compra">
  <input id="proveedor" placeholder="Proveedor">
  <input id="factura" placeholder="Factura">
  <input id="solicitado_por" placeholder="Quién mandó a comprar">

  <div id="productosList"></div>

  <button onclick="agregarProducto()">+ Agregar producto</button>
  <br><br>
  <button onclick="guardarEntrada()">Guardar Entrada</button>
</div>

<!-- TRASPASOS -->
<div class="card" id="traspasos" style="display:none;">
  <h3>🔄 Traspaso de material</h3>

  <label>Producto</label>
  <select id="producto"></select>

  <label>Ubicación origen</label>
  <select id="origen"></select>

  <label>Ubicación destino</label>
  <select id="destino"></select>

  <input id="cantidad" placeholder="Cantidad">

  <button onclick="hacerTraspaso()">Mover</button>
</div>

<!-- REQUISICIONES -->
<div class="card" id="requisiciones" style="display:none;">
  <h3>Requisiciones</h3>
  <p>En construcción 🚧</p>
</div>

<!-- INVENTARIO -->
<div class="card" id="inventario" style="display:none;">
  <h3>Inventario</h3>
  <p>Próximamente</p>
</div>

<!-- UBICACIONES -->
<div class="card" id="ubicaciones" style="display:none;">
  <h3>Ubicaciones</h3>
  <p>Próximamente</p>
</div>

<script>
let token = "";

// LOGIN
function login() {
  fetch("https://mexa-core-1.onrender.com/auth/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  })
  .then(res => res.json())
  .then(data => {
    token = data.access_token;
    localStorage.setItem("mexa_token", token);
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
  });
}

// AUTO LOGIN
window.onload = () => {
  const t = localStorage.getItem("mexa_token");
  if (t) {
    token = t;
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
  }
};

// NAVEGACIÓN
function show(id) {
  ["productos","entradas","traspasos","requisiciones","inventario","ubicaciones"]
    .forEach(x => {
      const el = document.getElementById(x);
      if (el) el.style.display = "none";
    });

  document.getElementById(id).style.display = "block";

  if (id === "traspasos") {
    cargarProductos();
    cargarUbicaciones();
  }
}

// LOGOUT
function logout() {
  localStorage.removeItem("mexa_token");
  location.reload();
}

// PRODUCTOS
function getProductos() {
  fetch("https://mexa-core-1.onrender.com/productos/", {
    headers: { "Authorization": "Bearer " + token }
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("productosOut").textContent =
      JSON.stringify(data, null, 2);
  });
}

// ENTRADAS MULTI PRODUCTO
let productos = [];

function agregarProducto() {
  const id = Date.now();
  productos.push({ id, producto_id: "", cantidad: "" });
  renderProductos();
}

function renderProductos() {
  let html = "";

  productos.forEach(p => {
    html += `
      <div>
        <input placeholder="Producto ID"
          onchange="updateProducto(${p.id}, 'producto_id', this.value)">
        
        <input placeholder="Cantidad"
          onchange="updateProducto(${p.id}, 'cantidad', this.value)">
      </div>
    `;
  });

  document.getElementById("productosList").innerHTML = html;
}

function updateProducto(id, campo, valor) {
  const p = productos.find(x => x.id === id);
  p[campo] = valor;
}

function guardarEntrada() {
  fetch("https://mexa-core-1.onrender.com/entradas/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      organizacion_id: 1,
      orden_compra: document.getElementById("orden_compra").value,
      proveedor: document.getElementById("proveedor").value,
      factura: document.getElementById("factura").value,
      solicitado_por: document.getElementById("solicitado_por").value,
      productos: productos.map(p => ({
        producto_id: parseInt(p.producto_id),
        cantidad: parseInt(p.cantidad)
      }))
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("Entrada registrada 🔥");
    console.log(data);
  });
}

// TRASPASOS
async function cargarProductos() {
  const res = await fetch("https://mexa-core-1.onrender.com/productos/", {
    headers: { Authorization: "Bearer " + token }
  });
  const data = await res.json();

  document.getElementById("producto").innerHTML =
    data.map(p => `<option value="${p.id}">${p.nombre}</option>`).join("");
}

async function cargarUbicaciones() {
  const res = await fetch("https://mexa-core-1.onrender.com/ubicaciones/", {
    headers: { Authorization: "Bearer " + token }
  });
  const data = await res.json();

  const options = data.map(u =>
    `<option value="${u.id}">${u.nombre}</option>`
  ).join("");

  document.getElementById("origen").innerHTML = options;
  document.getElementById("destino").innerHTML = options;
}

function hacerTraspaso() {
  fetch("https://mexa-core-1.onrender.com/traspasos/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      producto_id: parseInt(document.getElementById("producto").value),
      ubicacion_origen_id: parseInt(document.getElementById("origen").value),
      ubicacion_destino_id: parseInt(document.getElementById("destino").value),
      cantidad: parseInt(document.getElementById("cantidad").value)
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("Traspaso hecho 🔥");
    console.log(data);
  });
}
</script>

</body>
</html>
