<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mexa Digital</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 10px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

button {
  padding: 12px;
  border-radius: 8px;
  border: none;
  width: 100%;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: none;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
</style>
</head>

<body>

<h2>Mexa Digital</h2>

<!-- LOGIN -->
<div class="card" id="loginBox">
  <h3>Login</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Entrar</button>
</div>

<!-- PANEL -->
<div class="card" id="panel" style="display:none;">
  <h3>Panel</h3>

  <div class="grid">
    <button onclick="show('productos')">📦 Productos</button>
    <button onclick="show('movimientos')">🔄 Movimientos</button>
    <button onclick="show('requisiciones')">📋 Requisiciones</button>
    <button onclick="show('inventario')">📊 Inventario</button>
    <button onclick="show('ubicaciones')">📍 Ubicaciones</button>
    <button onclick="logout()" style="background:red;color:white;">🚪 Salir</button>
  </div>
</div>

<!-- PRODUCTOS -->
<div class="card" id="productos" style="display:none;">
  <h3>Productos</h3>
  <button onclick="getProductos()">Cargar</button>
  <pre id="productosOut"></pre>
</div>

<!-- MOVIMIENTOS -->
<div class="card" id="movimientos" style="display:none;">
  <h3>Registrar Movimiento</h3>

  <input id="producto_id" placeholder="Producto ID">
  <input id="cantidad" placeholder="Cantidad">

  <select id="tipo">
    <option value="entrada">Entrada</option>
    <option value="salida">Salida</option>
  </select>

  <!-- CAMPOS IMPORTANTES -->
  <input id="orden_compra" placeholder="Orden de compra">
  <input id="proveedor" placeholder="Proveedor">
  <input id="factura" placeholder="Factura">
  <input id="solicitado_por" placeholder="Quién mandó a comprar">

  <input id="nota" placeholder="Nota">

  <button onclick="crearMovimiento()">Guardar</button>
</div>

<!-- REQUISICIONES -->
<div class="card" id="requisiciones" style="display:none;">
  <h3>Requisiciones</h3>
  <p>En construcción 🚧</p>
</div>

<!-- INVENTARIO -->
<div class="card" id="inventario" style="display:none;">
  <h3>Inventario</h3>
  <p>Próximamente</p>
</div>

<!-- UBICACIONES -->
<div class="card" id="ubicaciones" style="display:none;">
  <h3>Ubicaciones</h3>
  <p>Próximamente</p>
</div>

<script>
let token = "";

// LOGIN
function login() {
  fetch("https://mexa-core-1.onrender.com/auth/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  })
  .then(res => res.json())
  .then(data => {
    token = data.access_token;
    localStorage.setItem("mexa_token", token);

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
  });
}

// AUTO LOGIN
window.onload = () => {
  const t = localStorage.getItem("mexa_token");
  if (t) {
    token = t;
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
  }
};

// NAVEGACIÓN
function show(id) {
  ["productos","movimientos","requisiciones","inventario","ubicaciones"]
    .forEach(x => document.getElementById(x).style.display = "none");

  document.getElementById(id).style.display = "block";
}

// LOGOUT
function logout() {
  localStorage.removeItem("mexa_token");
  location.reload();
}

// PRODUCTOS
function getProductos() {
  fetch("https://mexa-core-1.onrender.com/productos/", {
    headers: { "Authorization": "Bearer " + token }
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("productosOut").textContent =
      JSON.stringify(data, null, 2);
  });
}

// MOVIMIENTOS
function crearMovimiento() {
  fetch("https://mexa-core-1.onrender.com/movimientos/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      organizacion_id: 1,
      producto_id: parseInt(document.getElementById("producto_id").value),
      tipo: document.getElementById("tipo").value,
      cantidad: parseInt(document.getElementById("cantidad").value),
      usuario: "admin@mexa.com",

      orden_compra: document.getElementById("orden_compra").value,
      proveedor: document.getElementById("proveedor").value,
      factura: document.getElementById("factura").value,
      solicitado_por: document.getElementById("solicitado_por").value,
      nota: document.getElementById("nota").value
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("Movimiento registrado 🔥");
    console.log(data);
  });
}
</script>

</body>
</html>
