<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mexa Digital</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
    }

    header {
      background:#020617;
      padding:20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid #1f2937;
    }

    header h2 { margin:0; }

    button {
      border:none;
      padding:10px 14px;
      border-radius:8px;
      background:#2563eb;
      color:white;
      cursor:pointer;
      font-weight:bold;
    }

    .danger { background:#dc2626; }

    .container {
      max-width:1100px;
      margin:auto;
      padding:20px;
    }

    .hidden { display:none; }

    .card {
      background:#111827;
      border:1px solid #374151;
      border-radius:14px;
      padding:16px;
      margin-bottom:15px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:12px;
      margin-bottom:20px;
    }

    input, select {
      width:100%;
      padding:10px;
      margin:6px 0 12px;
      border-radius:8px;
      border:1px solid #374151;
      background:#020617;
      color:white;
    }

    .muted { color:#9ca3af; }

    .pill {
      display:inline-block;
      background:#1f2937;
      padding:4px 8px;
      border-radius:999px;
      margin-right:5px;
      font-size:12px;
    }
  </style>
</head>

<body>

<header>
  <h2>Mexa Digital</h2>
  <div>
    <button onclick="cargarTodo()">Actualizar</button>
    <button class="danger" onclick="logout()">Salir</button>
  </div>
</header>

<div id="login" class="container">
  <div class="card">
    <h2>Login</h2>
    <input id="email" value="admin.ica@mexa.com">
    <input id="password" type="password" value="123456">
    <button onclick="login()">Entrar</button>
    <p id="msg" class="muted"></p>
  </div>
</div>

<div id="app" class="container hidden">

  <h3>Ubicaciones</h3>
  <div id="grid" class="grid"></div>

  <div class="card">
    <h3>Crear ubicación</h3>
    <input id="uNombre" placeholder="Nombre">
    <input id="uResp" placeholder="Responsable">
    <button onclick="crearUbicacion()">Guardar</button>
  </div>

  <div class="card">
    <h3>Crear producto</h3>
    <input id="pNombre" placeholder="Nombre">
    <input id="pCodigo" placeholder="Código">
    <input id="pCant" type="number" value="0">
    <select id="pUbicacion"></select>
    <button onclick="crearProducto()">Guardar</button>
  </div>

  <div class="card">
    <h3>Productos</h3>
    <div id="tabla"></div>
  </div>

</div>

<script>
const API = "https://mexa-core-1.onrender.com";

function token() {
  return localStorage.getItem("token");
}

function headers() {
  return {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + token()
  };
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const rutas = ["/auth/login", "/auth/auth/login"];

  for (let r of rutas) {
    try {
      let res = await fetch(API + r, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, password})
      });

      let data = await res.json();

      if (res.ok) {
        localStorage.setItem("token", data.access_token);
        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        cargarTodo();
        return;
      }

    } catch {}
  }

  document.getElementById("msg").innerText = "Error login";
}

function logout() {
  localStorage.removeItem("token");
  location.reload();
}

async function cargarTodo() {
  let resU = await fetch(API + "/ubicaciones/ubicaciones/", {headers:headers()});
  let ubicaciones = await resU.json();

  let resP = await fetch(API + "/productos/", {headers:headers()});
  let productos = await resP.json();

  renderUbicaciones(ubicaciones, productos);
  renderSelect(ubicaciones);
  renderProductos(productos);
}

function renderUbicaciones(ubicaciones, productos) {
  let grid = document.getElementById("grid");
  grid.innerHTML = "";

  ubicaciones.forEach(u => {
    let prods = productos.filter(p => p.ubicacion === u.nombre);
    let stock = prods.reduce((s, p) => s + (p.cantidad || 0), 0);

    grid.innerHTML += `
      <div class="card">
        <b>${u.nombre}</b><br>
        <span class="muted">${u.tipo}</span><br>
        <span class="pill">Productos: ${prods.length}</span>
        <span class="pill">Stock: ${stock}</span>
      </div>
    `;
  });
}

function renderSelect(ubicaciones) {
  let select = document.getElementById("pUbicacion");
  select.innerHTML = "";

  ubicaciones.forEach(u => {
    select.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`;
  });
}

function renderProductos(productos) {
  let div = document.getElementById("tabla");

  div.innerHTML = productos.map(p => `
    <div class="card">
      <b>${p.nombre}</b><br>
      Código: ${p.codigo}<br>
      Ubicación: ${p.ubicacion || "Sin ubicación"}<br>
      Stock: ${p.cantidad}
    </div>
  `).join("");
}

async function crearUbicacion() {
  let nombre = document.getElementById("uNombre").value;

  await fetch(API + "/ubicaciones/ubicaciones/", {
    method:"POST",
    headers:headers(),
    body:JSON.stringify({nombre, tipo:"contenedor"})
  });

  cargarTodo();
}

async function crearProducto() {
  let body = {
    nombre: document.getElementById("pNombre").value,
    codigo: document.getElementById("pCodigo").value,
    cantidad: Number(document.getElementById("pCant").value),
    ubicacion: document.getElementById("pUbicacion").value,
    tipo: "consumible"
  };

  let res = await fetch(API + "/productos/", {
    method:"POST",
    headers:headers(),
    body:JSON.stringify(body)
  });

  let txt = await res.text();

  if (!res.ok) {
    alert("Error:\n" + txt);
  } else {
    alert("Producto creado");
    cargarTodo();
  }
}

if (token()) {
  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  cargarTodo();
}
</script>

</body>
</html>
