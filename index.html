<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mexa Digital | Control ICA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; }
    header { background:#020617; padding:20px; text-align:center; }
    .container { max-width:1100px; margin:auto; padding:20px; }
    .card { background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    input, select, button {
      width:100%; padding:10px; margin-top:8px;
      border-radius:6px; border:none;
    }
    input, select { background:#334155; color:white; }
    button { background:#16a34a; color:white; font-weight:bold; cursor:pointer; }
    .danger { background:#dc2626; }
    .ok { color:#22c55e; }
    .error { color:#f87171; }
    table { width:100%; margin-top:10px; border-collapse:collapse; }
    th, td { padding:8px; border-bottom:1px solid #334155; }
    th { background:#020617; }
  </style>
</head>

<body>

<header>
  <h1>Mexa Digital</h1>
  <p>Control ICA</p>
</header>

<div class="container">

<div class="card">
  <h2>Login</h2>
  <input id="email">
  <input id="password" type="password">
  <button onclick="login()">Login</button>
  <p id="loginStatus"></p>
</div>

<div class="grid">

<div class="card">
  <h2>Crear ubicación</h2>
  <input id="u_nombre">
  <select id="u_tipo">
    <option value="contenedor">Contenedor</option>
    <option value="nave">Nave</option>
  </select>
  <button onclick="crearUbicacion()">Crear</button>
  <p id="ubicStatus"></p>
</div>

<div class="card">
  <h2>Crear producto</h2>
  <input id="p_nombre">
  <input id="p_codigo">
  <input id="p_tipo">
  <button onclick="crearProducto()">Crear</button>
  <p id="prodStatus"></p>
</div>

</div>

<div class="card">
  <h2>Ubicaciones</h2>
  <button onclick="cargarUbicaciones()">Cargar</button>
  <table>
    <tbody id="ubicacionesBody"></tbody>
  </table>
</div>

<div class="card">
  <h2>Productos</h2>
  <button onclick="cargarProductos()">Cargar</button>
  <table>
    <tbody id="productosBody"></tbody>
  </table>
</div>

<div class="card">
  <h2>Asignar stock</h2>
  <select id="asig_producto"></select>
  <select id="asig_ubicacion"></select>
  <input id="asig_cantidad">
  <button onclick="asignar()">Asignar</button>
  <p id="asigStatus"></p>
</div>

<div class="card">
  <h2>Movimientos</h2>
  <select id="productoSelect"></select>
  <select id="tipo">
    <option value="entrada">Entrada</option>
    <option value="salida">Salida</option>
  </select>
  <input id="cantidad">
  <button onclick="movimiento()">Registrar</button>
  <p id="movStatus"></p>
</div>

<div class="card">
  <h2>Historial</h2>
  <button onclick="historial()">Cargar</button>
  <table>
    <tbody id="movimientosBody"></tbody>
  </table>
</div>

</div>

<script>
const API = "https://mexa-core-1.onrender.com";

function s(id,m,t="ok"){
  document.getElementById(id).innerText=typeof m==="string"?m:JSON.stringify(m);
  document.getElementById(id).className=t;
}

function t(){return localStorage.getItem("token")}

async function login(){
  let r=await fetch(API+"/auth/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({email:email.value,password:password.value})});
  let d=await r.json();
  if(!r.ok)return s("loginStatus",d,"error");
  localStorage.setItem("token",d.access_token);
  s("loginStatus","ok");
}

async function crearUbicacion(){
  let r=await fetch(API+"/ubicaciones/ubicaciones/",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+t()},
    body:JSON.stringify({nombre:u_nombre.value,tipo:u_tipo.value,organizacion_id:1})
  });
  let d=await r.json();
  if(!r.ok)return s("ubicStatus",d,"error");
  s("ubicStatus","ok");
}

async function crearProducto(){
  let r=await fetch(API+"/productos/productos/",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+t()},
    body:JSON.stringify({nombre:p_nombre.value,codigo:p_codigo.value,tipo:p_tipo.value,organizacion_id:1})
  });
  let d=await r.json();
  if(!r.ok)return s("prodStatus",d,"error");
  s("prodStatus","ok");
}

async function cargarUbicaciones(){
  let r=await fetch(API+"/ubicaciones/ubicaciones/",{headers:{Authorization:"Bearer "+t()}});
  let d=await r.json();
  ubicacionesBody.innerHTML="";
  asig_ubicacion.innerHTML="";
  d.forEach(x=>{
    ubicacionesBody.innerHTML+=`<tr><td>${x.id}</td><td>${x.nombre}</td></tr>`;
    asig_ubicacion.innerHTML+=`<option value="${x.id}">${x.nombre}</option>`;
  });
}

async function cargarProductos(){
  let r=await fetch(API+"/productos/productos/",{headers:{Authorization:"Bearer "+t()}});
  let d=await r.json();
  productosBody.innerHTML="";
  productoSelect.innerHTML="";
  asig_producto.innerHTML="";
  d.forEach(x=>{
    productosBody.innerHTML+=`<tr><td>${x.id}</td><td>${x.nombre}</td></tr>`;
    productoSelect.innerHTML+=`<option value="${x.id}">${x.nombre}</option>`;
    asig_producto.innerHTML+=`<option value="${x.id}">${x.nombre}</option>`;
  });
}

async function asignar(){
  let r=await fetch(API+"/inventario-ubicaciones/asignar",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+t()},
    body:JSON.stringify({
      producto_id:+asig_producto.value,
      ubicacion_id:+asig_ubicacion.value,
      cantidad:+asig_cantidad.value
    })
  });
  let d=await r.json();
  if(!r.ok)return s("asigStatus",d,"error");
  s("asigStatus","ok");
}

async function movimiento(){
  let r=await fetch(API+"/movimientos/",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+t()},
    body:JSON.stringify({
      producto_id:+productoSelect.value,
      tipo:tipo.value,
      cantidad:+cantidad.value,
      organizacion_id:1
    })
  });
  let d=await r.json();
  if(!r.ok)return s("movStatus",d,"error");
  s("movStatus","ok");
}

async function historial(){
  let r=await fetch(API+"/movimientos/",{headers:{Authorization:"Bearer "+t()}});
  let d=await r.json();
  movimientosBody.innerHTML="";
  d.forEach(x=>{
    movimientosBody.innerHTML+=`<tr><td>${x.tipo}</td><td>${x.cantidad}</td></tr>`;
  });
}
</script>

</body>
</html>
