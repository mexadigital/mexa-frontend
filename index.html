<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mexa Digital</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
header{padding:16px;background:#020617;display:flex;justify-content:space-between;align-items:center}
button{padding:6px 10px;border:none;border-radius:6px;background:#2563eb;color:white;cursor:pointer}
.danger{background:#dc2626}
.container{max-width:760px;margin:auto;padding:16px}
.card{background:#111827;padding:10px;border-radius:10px;margin-bottom:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
input,select{width:100%;padding:6px;margin:4px 0;background:#020617;color:white;border:1px solid #374151;border-radius:6px}
.hidden{display:none}
#login{max-width:400px;margin:80px auto}
.status{color:#93c5fd;font-size:13px}
h3{margin-top:24px}
.mov{border-left:4px solid #dc2626}

.card:hover{outline:1px solid #2563eb}
.ubicacionActiva{outline:2px solid #22c55e}
.resumenUbicacion{background:#020617;padding:10px;border-radius:10px;margin-bottom:12px}
.small{font-size:13px;color:#cbd5e1}
</style>
</head>

<body>

<header>
  <h2>Mexa Digital</h2>
  <div>
    <button onclick="cargarTodo()">Actualizar</button>
    <button class="danger" onclick="cerrarSesion()">Salir</button>
  </div>
</header>

<div id="login" class="container">
  <h2>Login</h2>
  <input id="email" value="admin.ica@mexa.com">
  <input id="password" type="password" value="123456">
  <button onclick="login()">Entrar</button>
  <p id="msg"></p>
</div>

<div id="app" class="container hidden">

  <p id="estado" class="status"></p>

  <h3>Ubicaciones</h3>
  <div id="grid" class="grid"></div>

  <div id="productosUbicacion" class="resumenUbicacion hidden"></div>

  <h3>Registrar salida</h3>
  <select id="sProducto"></select>

  <!-- NUEVO -->
  <select id="sUbicacion"></select>

  <input id="sCantidad" type="number" value="1" placeholder="Cantidad">
  <input id="sRecibe" placeholder="Quién recibe">
  <input id="sNota" placeholder="Nota / frente de trabajo">
  <button onclick="registrarSalida()">Registrar salida</button>

  <h3>Historial de movimientos</h3>
  <div id="movimientos"></div>

</div>

<script>
const API="https://mexa-core-1.onrender.com";

let ubicacionesPantalla=[];
let productosPantalla=[];
let movimientosPantalla=[];
let ubicacionSeleccionada="";

function headers(){
  return {
    "Content-Type":"application/json",
    "Authorization":"Bearer "+localStorage.getItem("token")
  };
}

async function cargarTodo(){

  let resU=await fetch(API+"/ubicaciones/ubicaciones/",{headers:headers()});
  if(resU.ok) ubicacionesPantalla=await resU.json();

  let resP=await fetch(API+"/productos/productos/",{headers:headers()});
  if(resP.ok) productosPantalla=await resP.json();

  let resM=await fetch(API+"/movimientos/movimientos/",{headers:headers()});
  if(resM.ok) movimientosPantalla=await resM.json();

  renderUbicaciones();
  renderSelectSalida();
  renderMovimientos();
}

function renderUbicaciones(){
  let grid=document.getElementById("grid");
  grid.innerHTML="";

  ubicacionesPantalla.forEach(u=>{
    grid.innerHTML+=`
      <div class="card ${ubicacionSeleccionada===u.nombre ? "ubicacionActiva":""}"
        onclick="mostrarProductosUbicacion('${u.nombre}')">
        <b>${u.nombre}</b><br>
        Tipo: ${u.tipo || "-"}<br>
        Responsable: ${u.responsable || "-"}
      </div>
    `;
  });
}

function mostrarProductosUbicacion(nombre){
  ubicacionSeleccionada=nombre;

  let div=document.getElementById("productosUbicacion");
  let productos=productosPantalla.filter(p=>p.ubicacion===nombre);

  div.classList.remove("hidden");

  div.innerHTML=`
    <b>${nombre}</b><br><br>
    ${productos.map(p=>`${p.nombre} (${p.cantidad})`).join("<br>")}
  `;

  renderUbicaciones();
}

/* 🔹 ACTUALIZADO */
function renderSelectSalida(){
  let selectP=document.getElementById("sProducto");
  let selectU=document.getElementById("sUbicacion");

  selectP.innerHTML="";
  selectU.innerHTML="";

  productosPantalla.forEach(p=>{
    selectP.innerHTML+=`
      <option value="${p.codigo}">
        ${p.nombre} | Stock: ${p.cantidad}
      </option>
    `;
  });

  ubicacionesPantalla.forEach(u=>{
    selectU.innerHTML+=`
      <option value="${u.nombre}">
        ${u.nombre}
      </option>
    `;
  });
}

async function registrarSalida(){

  let codigo=document.getElementById("sProducto").value;
  let cantidad=Number(document.getElementById("sCantidad").value);
  let recibe=document.getElementById("sRecibe").value;
  let nota=document.getElementById("sNota").value;
  let ubicacion=document.getElementById("sUbicacion").value;

  let producto=productosPantalla.find(p=>p.codigo===codigo);

  if(cantidad > producto.cantidad){
    alert("No hay suficiente stock");
    return;
  }

  let movimiento={
    tipo:"salida",
    producto_id:producto.id,
    cantidad:cantidad,
    recibe:recibe,
    nota:nota,
    ubicacion:ubicacion
  };

  await fetch(API+"/movimientos/movimientos/",{
    method:"POST",
    headers:headers(),
    body:JSON.stringify(movimiento)
  });

  await cargarTodo();
}

/* 🔹 ACTUALIZADO HISTORIAL */
function renderMovimientos(){

  let div=document.getElementById("movimientos");

  div.innerHTML=movimientosPantalla
  .slice()
  .reverse()
  .map(m=>`
    <div class="card mov">
      <b>${m.recibe}</b> → sacó ${m.cantidad} de ${m.producto_nombre || m.codigo}<br>
      Ubicación: ${m.ubicacion || "-"}<br>
      <span class="small">
        Nota: ${m.nota || "-"}
      </span><br>
      <span class="small">
        ${m.created_at || ""}
      </span>
    </div>
  `).join("");
}

if(localStorage.getItem("token")){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  cargarTodo();
}
</script>

</body>
</html>
