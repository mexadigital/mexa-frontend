<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mexa Digital</title>

<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:white;margin:0;padding:20px}
.container{max-width:1200px;margin:auto}
.card{background:#1e293b;padding:20px;border-radius:12px;margin-bottom:20px}
h1,h2{color:#38bdf8}
input,select{padding:10px;margin:5px;border-radius:6px;border:none}
button{padding:10px 15px;border:none;border-radius:6px;background:#38bdf8;color:black;cursor:pointer;font-weight:bold;margin:5px}
button:hover{background:#0ea5e9}
.logout{background:#f87171}
.logout:hover{background:#ef4444}
.ok{color:#4ade80}
.error{color:#f87171}
.small{color:#94a3b8;font-size:13px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}

table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px}
th{background:#334155;color:#38bdf8;text-align:left;padding:10px}
td{border-bottom:1px solid #334155;padding:10px}
tr:hover{background:#273449}
.badge{background:#0f172a;border:1px solid #475569;border-radius:20px;padding:4px 8px;font-size:12px}
.danger{background:#f87171;color:black}
</style>
</head>

<body>
<div class="container">

<div class="card">
  <h1>Mexa Digital</h1>
  <p class="small">Dashboard limpio de ubicaciones y productos.</p>
  <p id="usuarioInfo"></p>
  <button id="logoutBtn" onclick="logout()" class="logout" style="display:none;">Cerrar sesión</button>
</div>

<div class="card" id="loginCard">
  <h2>Login</h2>
  <input id="email" placeholder="email">
  <input id="password" type="password" placeholder="password">
  <button onclick="login()">Entrar</button>
  <p id="loginStatus"></p>
</div>

<div class="grid">

  <div class="card">
    <h2>📍 Ubicaciones</h2>
    <p class="small">Crea y administra contenedores, naves y almacenes.</p>

    <input id="ubicacion_nombre" placeholder="Ej: M-06, C-01, Nave 12">

    <select id="ubicacion_tipo">
      <option value="">Selecciona tipo</option>
      <option value="contenedor">Contenedor</option>
      <option value="nave">Nave</option>
      <option value="almacen_abierto">Almacén a cielo abierto</option>
      <option value="bodega">Bodega</option>
      <option value="patio">Patio</option>
    </select>

    <br>

    <button onclick="crearUbicacion(event)">Crear ubicación</button>
    <button onclick="cargarUbicaciones()">Actualizar</button>

    <p id="ubicacionStatus"></p>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Tipo</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="tablaUbicaciones"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>📦 Productos</h2>
    <p class="small">Crea productos. El stock sube después con entradas.</p>

    <input id="producto_nombre" placeholder="Ej: Disco Corte 4.5">
    <input id="producto_codigo" placeholder="Ej: DC-01">

    <select id="producto_tipo">
      <option value="">Selecciona tipo</option>
      <option value="consumible">Consumible</option>
      <option value="herramienta">Herramienta</option>
      <option value="epp">EPP</option>
    </select>

    <br>

    <button onclick="crearProducto(event)">Crear producto</button>
    <button onclick="cargarProductos()">Actualizar</button>

    <p id="productoStatus"></p>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Producto</th>
          <th>Código</th>
          <th>Tipo</th>
          <th>Stock</th>
        </tr>
      </thead>
      <tbody id="tablaProductos"></tbody>
    </table>
  </div>

</div>

</div>

<script>
const API="https://mexa-core-1.onrender.com";

const LOGIN_URL=`${API}/auth/auth/login`;
const UBICACIONES_URL=`${API}/ubicaciones/ubicaciones/`;
const PRODUCTOS_URL=`${API}/productos/productos/`;

const ORGANIZACION_ID = 8;

let token=localStorage.getItem("mexa_token")||"";
let usuario=localStorage.getItem("mexa_usuario")||"";

function mostrarSesion(){
  if(token){
    usuarioInfo.innerText="Usuario: "+usuario;
    loginCard.style.display="none";
    logoutBtn.style.display="inline-block";
  }else{
    usuarioInfo.innerText="";
    loginCard.style.display="block";
    logoutBtn.style.display="none";
  }
}

function logout(){
  localStorage.removeItem("mexa_token");
  localStorage.removeItem("mexa_usuario");
  token="";
  usuario="";
  location.reload();
}

async function login(){
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value.trim();

  loginStatus.innerText="Entrando...";
  loginStatus.className="";

  const res=await fetch(LOGIN_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,password})
  });

  const data=await res.json();

  if(!res.ok){
    loginStatus.innerText=JSON.stringify(data);
    loginStatus.className="error";
    return;
  }

  token=data.access_token;
  usuario=email;

  localStorage.setItem("mexa_token",token);
  localStorage.setItem("mexa_usuario",usuario);

  mostrarSesion();
  await cargarTodo();
}

async function cargarTodo(){
  await cargarUbicaciones();
  await cargarProductos();
}

async function cargarUbicaciones(){
  if(!token) return;

  const res=await fetch(UBICACIONES_URL,{
    headers:{Authorization:"Bearer "+token}
  });

  const data=await res.json();

  if(!res.ok){
    ubicacionStatus.innerText=JSON.stringify(data);
    ubicacionStatus.className="error";
    return;
  }

  const lista=Array.isArray(data)?data:(data.items||data.data||[]);

  tablaUbicaciones.innerHTML="";

  lista.forEach(u=>{
    tablaUbicaciones.innerHTML+=`
      <tr>
        <td>${u.id}</td>
        <td><strong>${u.nombre}</strong></td>
        <td><span class="badge">${u.tipo}</span></td>
        <td><button class="logout" onclick="eliminarUbicacion(${u.id})">Eliminar</button></td>
      </tr>
    `;
  });

  ubicacionStatus.innerText="✔ Ubicaciones cargadas: "+lista.length;
  ubicacionStatus.className="ok";
}

async function crearUbicacion(event){
  const btn=event.target;
  btn.disabled=true;

  const nombre=document.getElementById("ubicacion_nombre").value.trim();
  const tipo=document.getElementById("ubicacion_tipo").value;

  if(!nombre || !tipo){
    alert("Completa nombre y tipo");
    btn.disabled=false;
    return;
  }

  const res=await fetch(UBICACIONES_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({
      organizacion_id:ORGANIZACION_ID,
      nombre,
      tipo
    })
  });

  const data=await res.json();

  if(!res.ok){
    ubicacionStatus.innerText=JSON.stringify(data);
    ubicacionStatus.className="error";
    btn.disabled=false;
    return;
  }

  ubicacion_nombre.value="";
  ubicacion_tipo.value="";

  ubicacionStatus.innerText="✔ Ubicación creada";
  ubicacionStatus.className="ok";

  btn.disabled=false;
  await cargarUbicaciones();
}

async function eliminarUbicacion(id){
  if(!confirm("¿Seguro que quieres eliminar esta ubicación?")) return;

  const res=await fetch(`${UBICACIONES_URL}${id}`,{
    method:"DELETE",
    headers:{Authorization:"Bearer "+token}
  });

  const data=await res.json();

  if(!res.ok){
    alert("Error: "+JSON.stringify(data));
    return;
  }

  await cargarUbicaciones();
}

async function cargarProductos(){
  if(!token) return;

  const res=await fetch(PRODUCTOS_URL,{
    headers:{Authorization:"Bearer "+token}
  });

  const data=await res.json();

  if(!res.ok){
    productoStatus.innerText=JSON.stringify(data);
    productoStatus.className="error";
    return;
  }

  const lista=Array.isArray(data)?data:(data.items||data.data||[]);

  tablaProductos.innerHTML="";

  lista.forEach(p=>{
    tablaProductos.innerHTML+=`
      <tr>
        <td>${p.id}</td>
        <td><strong>${p.nombre}</strong></td>
        <td>${p.codigo || "Sin código"}</td>
        <td><span class="badge">${p.tipo || "N/A"}</span></td>
        <td><strong>${p.cantidad ?? 0}</strong></td>
      </tr>
    `;
  });

  productoStatus.innerText="✔ Productos cargados: "+lista.length;
  productoStatus.className="ok";
}

async function crearProducto(event){
  const btn=event.target;
  btn.disabled=true;

  const nombre=document.getElementById("producto_nombre").value.trim();
  const codigo=document.getElementById("producto_codigo").value.trim();
  const tipo=document.getElementById("producto_tipo").value;

  if(!nombre || !codigo || !tipo){
    alert("Completa nombre, código y tipo");
    btn.disabled=false;
    return;
  }

  const res=await fetch(PRODUCTOS_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({
      nombre,
      codigo,
      tipo
    })
  });

  const data=await res.json();

  if(!res.ok){
    productoStatus.innerText=JSON.stringify(data);
    productoStatus.className="error";
    btn.disabled=false;
    return;
  }

  producto_nombre.value="";
  producto_codigo.value="";
  producto_tipo.value="";

  productoStatus.innerText="✔ Producto creado";
  productoStatus.className="ok";

  btn.disabled=false;
  await cargarProductos();
}

window.onload=()=>{
  mostrarSesion();
  if(token) cargarTodo();
};
</script>

</body>
</html>
