<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mexa Digital</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px}
.container{max-width:1300px;margin:auto}
.card{background:#1e293b;padding:20px;border-radius:12px;margin-bottom:20px}
h1,h2{color:#38bdf8}
input,select{padding:10px;margin:5px;border-radius:6px;border:none}
button{padding:10px;border:none;border-radius:6px;background:#38bdf8;color:black;margin:5px}
.logout{background:#f87171}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #334155}
th{color:#38bdf8}
.badge{background:#0f172a;border:1px solid #475569;border-radius:20px;padding:3px 8px}
.ok{color:#4ade80}
.error{color:#f87171}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h1>Mexa Digital</h1>
<p id="usuarioInfo"></p>
<button onclick="logout()" class="logout">Cerrar sesión</button>
</div>

<div class="grid">

<div class="card">
<h2>📍 Ubicaciones</h2>
<input id="ubicacion_nombre" placeholder="Nombre">
<select id="ubicacion_tipo">
<option value="">Tipo</option>
<option value="contenedor">Contenedor</option>
<option value="nave">Nave</option>
</select>
<button onclick="crearUbicacion()">Crear</button>
<button onclick="cargarUbicaciones()">Actualizar</button>

<table>
<thead>
<tr><th>ID</th><th>Nombre</th><th>Tipo</th></tr>
</thead>
<tbody id="tablaUbicaciones"></tbody>
</table>
</div>

<div class="card">
<h2>📦 Productos</h2>
<input id="producto_nombre" placeholder="Nombre">
<input id="producto_codigo" placeholder="Código">
<select id="producto_tipo">
<option value="">Tipo</option>
<option value="consumible">Consumible</option>
<option value="herramienta">Herramienta</option>
<option value="epp">EPP</option>
</select>
<button onclick="crearProducto()">Crear</button>
<button onclick="cargarProductos()">Actualizar</button>

<table>
<thead>
<tr><th>ID</th><th>Nombre</th><th>Stock</th></tr>
</thead>
<tbody id="tablaProductos"></tbody>
</table>
</div>

</div>

<div class="card">
<h2>📥 Entrada</h2>
<input id="entrada_producto" placeholder="ID Producto">
<input id="entrada_cantidad" placeholder="Cantidad">
<input id="entrada_recibe" placeholder="Recibe">
<button onclick="entrada()">Registrar entrada</button>
</div>

<div class="card">
<h2>📤 Salida</h2>
<input id="salida_producto" placeholder="ID Producto">
<input id="salida_cantidad" placeholder="Cantidad">
<input id="salida_recibe" placeholder="Recibe">
<button onclick="salida()">Registrar salida</button>
</div>

<div class="card">
<h2>📜 Historial</h2>
<button onclick="cargarMovimientos()">Actualizar</button>
<table>
<thead>
<tr><th>Producto</th><th>Tipo</th><th>Cantidad</th><th>Recibe</th></tr>
</thead>
<tbody id="tablaMovimientos"></tbody>
</table>
</div>

</div>

<script>
const API="https://mexa-core-1.onrender.com";
const token=localStorage.getItem("mexa_token");

async function cargarUbicaciones(){
 const res=await fetch(API+"/ubicaciones/ubicaciones/",{headers:{Authorization:"Bearer "+token}});
 const data=await res.json();
 tablaUbicaciones.innerHTML="";
 data.forEach(u=>{
 tablaUbicaciones.innerHTML+=`<tr><td>${u.id}</td><td>${u.nombre}</td><td>${u.tipo}</td></tr>`;
 });
}

async function crearUbicacion(){
 await fetch(API+"/ubicaciones/ubicaciones/",{
 method:"POST",
 headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},
 body:JSON.stringify({organizacion_id:8,nombre:ubicacion_nombre.value,tipo:ubicacion_tipo.value})
 });
 cargarUbicaciones();
}

async function cargarProductos(){
 const res=await fetch(API+"/productos/productos/",{headers:{Authorization:"Bearer "+token}});
 const data=await res.json();
 tablaProductos.innerHTML="";
 data.forEach(p=>{
 tablaProductos.innerHTML+=`<tr><td>${p.id}</td><td>${p.nombre}</td><td>${p.cantidad}</td></tr>`;
 });
}

async function crearProducto(){
 await fetch(API+"/productos/productos/",{
 method:"POST",
 headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},
 body:JSON.stringify({nombre:producto_nombre.value,codigo:producto_codigo.value,tipo:producto_tipo.value})
 });
 cargarProductos();
}

async function entrada(){
 await fetch(API+"/movimientos/",{
 method:"POST",
 headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},
 body:JSON.stringify({producto_id:entrada_producto.value,tipo:"entrada",cantidad:entrada_cantidad.value,usuario:"admin",recibe:entrada_recibe.value})
 });
 cargarProductos();
}

async function salida(){
 await fetch(API+"/movimientos/",{
 method:"POST",
 headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},
 body:JSON.stringify({producto_id:salida_producto.value,tipo:"salida",cantidad:salida_cantidad.value,usuario:"admin",recibe:salida_recibe.value})
 });
 cargarProductos();
}

async function cargarMovimientos(){
 const res=await fetch(API+"/movimientos/",{headers:{Authorization:"Bearer "+token}});
 const data=await res.json();
 tablaMovimientos.innerHTML="";
 data.forEach(m=>{
 tablaMovimientos.innerHTML+=`<tr><td>${m.producto}</td><td>${m.tipo}</td><td>${m.cantidad}</td><td>${m.recibe}</td></tr>`;
 });
}
</script>

</body>
</html>
