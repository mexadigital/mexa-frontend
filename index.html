<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mexa Digital</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:10px;margin-bottom:20px}
input{padding:10px;margin:5px;border-radius:6px;border:none}
button{padding:10px;border:none;border-radius:6px;background:#38bdf8;color:black;margin:5px}
.logout{background:#f87171}
.item{border-bottom:1px solid #334155;padding:10px}
.ok{color:#4ade80}
.error{color:#f87171}
</style>

</head>

<body>

<div class="card">
<h1>Mexa Digital</h1>
<p id="usuarioInfo"></p>
<button id="logoutBtn" class="logout" onclick="logout()" style="display:none;">Cerrar sesión</button>
</div>

<div class="card" id="loginCard">
<h2>Login</h2>
<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">
<button onclick="login()">Entrar</button>
<p id="loginStatus"></p>
</div>

<div class="card">
<h2>Ubicaciones</h2>
<input id="ubicacion_nombre" placeholder="Nombre">
<input id="ubicacion_tipo" placeholder="Tipo">
<button onclick="crearUbicacion()">Crear</button>
<button onclick="cargarUbicaciones()">Actualizar</button>
<p id="ubicacionStatus"></p>
<div id="listaUbicaciones"></div>
</div>

<div class="card">
<h2>Productos</h2>
<button onclick="cargarProductos()">Actualizar</button>
<p id="productosStatus"></p>
<div id="listaProductos"></div>
</div>

<script>
const API="https://mexa-core-1.onrender.com";
const LOGIN_URL=`${API}/auth/auth/login`;
const UBICACIONES_URL=`${API}/ubicaciones/ubicaciones/`;
const PRODUCTOS_URL=`${API}/productos/productos/`;

let token=localStorage.getItem("mexa_token")||"";
let usuario=localStorage.getItem("mexa_usuario")||"";

function normalizarLista(data){
 if(Array.isArray(data)) return data;
 if(data?.items) return data.items;
 if(data?.data) return data.data;
 if(data?.results) return data.results;
 return [];
}

function mostrarSesion(){
 if(token){
  usuarioInfo.innerText="Usuario: "+usuario;
  logoutBtn.style.display="block";
  loginCard.style.display="none";
 }else{
  loginCard.style.display="block";
 }
}

function logout(){
 localStorage.clear();
 token="";
 usuario="";
 location.reload();
}

async function login(){
 const email=emailInput.value||document.getElementById("email").value;
 const password=document.getElementById("password").value;

 const res=await fetch(LOGIN_URL,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({email,password})
 });

 const data=await res.json();

 if(!res.ok){
  loginStatus.innerText=JSON.stringify(data);
  loginStatus.className="error";
  return;
 }

 token=data.access_token;
 usuario=email;

 localStorage.setItem("mexa_token",token);
 localStorage.setItem("mexa_usuario",usuario);

 loginStatus.innerText="Login correcto";
 loginStatus.className="ok";

 mostrarSesion();
 cargarTodo();
}

async function cargarTodo(){
 await cargarUbicaciones();
 await cargarProductos();
}

async function cargarUbicaciones(){
 const res=await fetch(UBICACIONES_URL,{
  headers:{Authorization:"Bearer "+token}
 });

 const data=await res.json();

 if(!res.ok){
  ubicacionStatus.innerText=data.detail||"Error";
  ubicacionStatus.className="error";
  return;
 }

 const lista=normalizarLista(data);
 listaUbicaciones.innerHTML="";

 lista.forEach(u=>{
  listaUbicaciones.innerHTML+=`
  <div class="item">
   ${u.nombre} (${u.tipo})
  </div>`;
 });

 ubicacionStatus.innerText="OK";
 ubicacionStatus.className="ok";
}

async function crearUbicacion(){
 const nombre=document.getElementById("ubicacion_nombre").value;
 const tipo=document.getElementById("ubicacion_tipo").value;

 const res=await fetch(UBICACIONES_URL,{
  method:"POST",
  headers:{
   "Content-Type":"application/json",
   Authorization:"Bearer "+token
  },
  body:JSON.stringify({nombre,tipo})
 });

 const data=await res.json();

 if(!res.ok){
  ubicacionStatus.innerText=data.detail;
  ubicacionStatus.className="error";
  return;
 }

 ubicacionStatus.innerText="Creado";
 ubicacionStatus.className="ok";

 cargarUbicaciones();
}

async function cargarProductos(){
 const res=await fetch(PRODUCTOS_URL,{
  headers:{Authorization:"Bearer "+token}
 });

 const data=await res.json();

 if(!res.ok){
  productosStatus.innerText="Error";
  productosStatus.className="error";
  return;
 }

 const lista=normalizarLista(data);
 listaProductos.innerHTML="";

 lista.forEach(p=>{
  listaProductos.innerHTML+=`
  <div class="item">
   ${p.nombre} - ${p.cantidad||0}
  </div>`;
 });

 productosStatus.innerText="OK";
 productosStatus.className="ok";
}

window.onload=()=>{
 mostrarSesion();
 if(token) cargarTodo();
};
</script>

</body>
</html>
