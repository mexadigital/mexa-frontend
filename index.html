<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mexa Digital</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

h1, h2 {
  color: #38bdf8;
}

input, select {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 6px;
  background: #38bdf8;
  color: black;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #0ea5e9;
}

.logout {
  background: #f87171;
}

.logout:hover {
  background: #ef4444;
}

.producto, .movimiento, .ubicacion {
  padding: 12px;
  border-bottom: 1px solid #334155;
}

.producto strong {
  color: #facc15;
}

.ok {
  color: #4ade80;
}

.error {
  color: #f87171;
}

.small {
  color: #94a3b8;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h1>Mexa Digital</h1>
    <p class="small">Control de productos, ubicaciones, entradas, salidas e historial.</p>
    <p id="usuarioInfo" class="ok"></p>
    <button id="logoutBtn" class="logout" onclick="logout()" style="display:none;">Cerrar sesión</button>
  </div>

  <div class="card" id="loginCard">
    <h2>🔐 Login</h2>
    <input id="email" placeholder="email">
    <input id="password" type="password" placeholder="password">
    <button onclick="login()">Entrar</button>
    <p id="loginStatus"></p>
  </div>

  <div class="card">
    <h2>📍 Ubicaciones</h2>
    <input id="ubicacion_nombre" placeholder="Nombre ubicación">
    <input id="ubicacion_tipo" placeholder="Tipo: almacen, contenedor, patio">
    <button onclick="crearUbicacion()">Crear ubicación</button>
    <p id="ubicacionStatus"></p>
    <div id="listaUbicaciones"></div>
  </div>

  <div class="card">
    <h2>📦 Productos</h2>
    <div id="listaProductos"></div>
  </div>

  <div class="card">
    <h2>➕ Crear Producto</h2>
    <input id="nombre" placeholder="Nombre">
    <input id="codigo" placeholder="Código">
    <input id="tipo" placeholder="Tipo">
    <input id="cantidad" type="number" placeholder="Cantidad inicial">
    <select id="ubicacion">
      <option value="">Selecciona ubicación</option>
    </select>
    <input id="precio" type="number" placeholder="Precio">
    <button onclick="crearProducto()">Crear</button>
    <p id="productoStatus"></p>
  </div>

  <div class="card">
    <h2>📥 Registrar entrada</h2>
    <input id="producto_id_entrada" type="number" placeholder="ID Producto">
    <input id="cantidad_entrada" type="number" placeholder="Cantidad">
    <select id="ubicacion_entrada">
      <option value="">Selecciona ubicación</option>
    </select>
    <input id="recibe_entrada" placeholder="Quién recibe / entrega">
    <input id="empleado_entrada" placeholder="Empleado / ficha">
    <input id="nota_entrada" placeholder="Nota">
    <button onclick="entrada()">Entrada</button>
    <p id="entradaStatus"></p>
  </div>

  <div class="card">
    <h2>📤 Registrar salida</h2>
    <input id="producto_id_salida" type="number" placeholder="ID Producto">
    <input id="cantidad_salida" type="number" placeholder="Cantidad">
    <select id="ubicacion_salida">
      <option value="">Selecciona ubicación</option>
    </select>
    <input id="recibe_salida" placeholder="Quién recibe">
    <input id="empleado_salida" placeholder="Empleado / ficha">
    <input id="nota_salida" placeholder="Nota">
    <button onclick="salida()">Salida</button>
    <p id="salidaStatus"></p>
  </div>

  <div class="card">
    <h2>📜 Historial de movimientos</h2>
    <button onclick="cargarMovimientos()">Actualizar historial</button>
    <div id="listaMovimientos"></div>
  </div>

</div>

<script>
const API = "https://mexa-core-1.onrender.com";

let token = localStorage.getItem("mexa_token") || "";
let usuario = localStorage.getItem("mexa_usuario") || "";

function mostrarSesion() {
  if (token && usuario) {
    document.getElementById("usuarioInfo").innerText = "👤 Usuario: " + usuario;
    document.getElementById("logoutBtn").style.display = "inline-block";
    document.getElementById("loginCard").style.display = "none";
  } else {
    document.getElementById("usuarioInfo").innerText = "";
    document.getElementById("logoutBtn").style.display = "none";
    document.getElementById("loginCard").style.display = "block";
  }
}

function logout() {
  localStorage.removeItem("mexa_token");
  localStorage.removeItem("mexa_usuario");
  token = "";
  usuario = "";

  document.getElementById("listaProductos").innerHTML = "";
  document.getElementById("listaMovimientos").innerHTML = "";
  document.getElementById("listaUbicaciones").innerHTML = "";

  mostrarSesion();
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(`${API}/auth/login`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (!res.ok) {
    document.getElementById("loginStatus").innerText = "❌ Error: " + JSON.stringify(data);
    document.getElementById("loginStatus").className = "error";
    return;
  }

  token = data.access_token;
  usuario = email;

  localStorage.setItem("mexa_token", token);
  localStorage.setItem("mexa_usuario", usuario);

  document.getElementById("email").value = "";
  document.getElementById("password").value = "";

  mostrarSesion();

  await cargarTodo();
}

async function cargarTodo() {
  await cargarUbicaciones();
  await cargarProductos();
  await cargarMovimientos();
}

async function cargarUbicaciones() {
  const res = await fetch(`${API}/ubicaciones/`, {
    headers: { "Authorization": "Bearer " + token }
  });

  const data = await res.json();

  if (!res.ok) {
    alert("Error al cargar ubicaciones: " + JSON.stringify(data));
    return;
  }

  const lista = document.getElementById("listaUbicaciones");
  const selectProducto = document.getElementById("ubicacion");
  const selectEntrada = document.getElementById("ubicacion_entrada");
  const selectSalida = document.getElementById("ubicacion_salida");

  lista.innerHTML = "";

  selectProducto.innerHTML = `<option value="">Selecciona ubicación</option>`;
  selectEntrada.innerHTML = `<option value="">Selecciona ubicación</option>`;
  selectSalida.innerHTML = `<option value="">Selecciona ubicación</option>`;

  data.sort((a, b) => b.id - a.id).forEach(u => {
    const div = document.createElement("div");
    div.className = "ubicacion";
    div.innerHTML = `
      📍 <strong>${u.nombre}</strong><br>
      ID: ${u.id} | Tipo: ${u.tipo} | Activo: ${u.activo ? "Sí" : "No"}
    `;
    lista.appendChild(div);

    const option1 = document.createElement("option");
    option1.value = u.nombre;
    option1.textContent = u.nombre;

    const option2 = document.createElement("option");
    option2.value = u.nombre;
    option2.textContent = u.nombre;

    const option3 = document.createElement("option");
    option3.value = u.nombre;
    option3.textContent = u.nombre;

    selectProducto.appendChild(option1);
    selectEntrada.appendChild(option2);
    selectSalida.appendChild(option3);
  });
}

async function crearUbicacion() {
  const nombre = document.getElementById("ubicacion_nombre").value;
  const tipo = document.getElementById("ubicacion_tipo").value;

  if (!nombre || !tipo) {
    alert("Faltan datos de la ubicación");
    return;
  }

  if (!confirm(`¿Crear ubicación?\n\nNombre: ${nombre}\nTipo: ${tipo}`)) return;

  const res = await fetch(`${API}/ubicaciones/`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      organizacion_id: 1,
      nombre,
      tipo
    })
  });

  const data = await res.json();

  if (!res.ok) {
    alert("Error al crear ubicación: " + JSON.stringify(data));
    return;
  }

  document.getElementById("ubicacion_nombre").value = "";
  document.getElementById("ubicacion_tipo").value = "";

  document.getElementById("ubicacionStatus").innerText = "✔ Ubicación creada";
  document.getElementById("ubicacionStatus").className = "ok";

  await cargarUbicaciones();
}

async function cargarProductos() {
  const res = await fetch(`${API}/productos/`, {
    headers: { "Authorization": "Bearer " + token }
  });

  const data = await res.json();

  if (!res.ok) {
    alert("Error al cargar productos: " + JSON.stringify(data));
    return;
  }

  const lista = document.getElementById("listaProductos");
  lista.innerHTML = "";

  data.sort((a, b) => b.id - a.id).forEach(p => {
    const div = document.createElement("div");
    div.className = "producto";
    div.innerHTML = `
      <strong>${p.nombre}</strong><br>
      ID: ${p.id} | Código: ${p.codigo || "Sin código"}<br>
      Tipo: ${p.tipo || "N/A"} | Stock: <strong>${p.cantidad}</strong><br>
      Ubicación: ${p.ubicacion || "Sin ubicación"} | Precio: ${p.precio ?? "N/A"}
    `;
    lista.appendChild(div);
  });
}

async function crearProducto() {
  const nombre = document.getElementById("nombre").value;
  const codigo = document.getElementById("codigo").value;
  const tipo = document.getElementById("tipo").value;
  const cantidad = parseInt(document.getElementById("cantidad").value);
  const ubicacion = document.getElementById("ubicacion").value || null;
  const precioValue = document.getElementById("precio").value;
  const precio = precioValue ? parseFloat(precioValue) : 0;

  if (!nombre || !codigo || !tipo || !cantidad) {
    alert("Faltan datos del producto");
    return;
  }

  if (!confirm(`¿Agregar producto?\n\nNombre: ${nombre}\nCódigo: ${codigo}\nCantidad: ${cantidad}\nUbicación: ${ubicacion || "Sin ubicación"}`)) return;

  const res = await fetch(`${API}/productos/`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      nombre,
      codigo,
      tipo,
      cantidad,
      ubicacion,
      precio
    })
  });

  const data = await res.json();

  if (!res.ok) {
    alert("Error al crear producto: " + JSON.stringify(data));
    return;
  }

  document.getElementById("nombre").value = "";
  document.getElementById("codigo").value = "";
  document.getElementById("tipo").value = "";
  document.getElementById("cantidad").value = "";
  document.getElementById("ubicacion").value = "";
  document.getElementById("precio").value = "";

  document.getElementById("productoStatus").innerText = "✔ Producto agregado al inventario";
  document.getElementById("productoStatus").className = "ok";

  await cargarProductos();
}

async function entrada() {
  const producto_id = parseInt(document.getElementById("producto_id_entrada").value);
  const cantidad = parseInt(document.getElementById("cantidad_entrada").value);
  const ubicacion = document.getElementById("ubicacion_entrada").value;
  const recibe = document.getElementById("recibe_entrada").value || null;
  const empleado = document.getElementById("empleado_entrada").value || null;
  let nota = document.getElementById("nota_entrada").value || "";

  if (!producto_id || !cantidad) {
    alert("Faltan datos para la entrada");
    return;
  }

  if (ubicacion) {
    nota = `[Ubicación: ${ubicacion}] ` + nota;
  }

  if (!confirm(`¿Registrar entrada?\n\nProducto ID: ${producto_id}\nCantidad: ${cantidad}\nUbicación: ${ubicacion || "Sin ubicación"}`)) return;

  const res = await fetch(`${API}/movimientos/`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      producto_id,
      tipo: "entrada",
      cantidad,
      usuario: usuario || "admin@mexa.com",
      recibe,
      empleado,
      nota
    })
  });

  const data = await res.json();

  if (!res.ok) {
    alert("Error al registrar entrada: " + JSON.stringify(data));
    return;
  }

  document.getElementById("producto_id_entrada").value = "";
  document.getElementById("cantidad_entrada").value = "";
  document.getElementById("ubicacion_entrada").value = "";
  document.getElementById("recibe_entrada").value = "";
  document.getElementById("empleado_entrada").value = "";
  document.getElementById("nota_entrada").value = "";

  document.getElementById("entradaStatus").innerText = "✔ Entrada registrada en sistema";
  document.getElementById("entradaStatus").className = "ok";

  await cargarProductos();
  await cargarMovimientos();
}

async function salida() {
  const producto_id = parseInt(document.getElementById("producto_id_salida").value);
  const cantidad = parseInt(document.getElementById("cantidad_salida").value);
  const ubicacion = document.getElementById("ubicacion_salida").value;
  const recibe = document.getElementById("recibe_salida").value || null;
  const empleado = document.getElementById("empleado_salida").value || null;
  let nota = document.getElementById("nota_salida").value || "";

  if (!producto_id || !cantidad) {
    alert("Faltan datos para la salida");
    return;
  }

  if (ubicacion) {
    nota = `[Ubicación: ${ubicacion}] ` + nota;
  }

  if (!confirm(`¿Registrar salida?\n\nProducto ID: ${producto_id}\nCantidad: ${cantidad}\nUbicación: ${ubicacion || "Sin ubicación"}`)) return;

  const res = await fetch(`${API}/movimientos/`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      producto_id,
      tipo: "salida",
      cantidad,
      usuario: usuario || "admin@mexa.com",
      recibe,
      empleado,
      nota
    })
  });

  const data = await res.json();

  if (!res.ok) {
    alert("Error al registrar salida: " + JSON.stringify(data));
    return;
  }

  document.getElementById("producto_id_salida").value = "";
  document.getElementById("cantidad_salida").value = "";
  document.getElementById("ubicacion_salida").value = "";
  document.getElementById("recibe_salida").value = "";
  document.getElementById("empleado_salida").value = "";
  document.getElementById("nota_salida").value = "";

  document.getElementById("salidaStatus").innerText = "✔ Salida registrada en sistema";
  document.getElementById("salidaStatus").className = "ok";

  await cargarProductos();
  await cargarMovimientos();
}

async function cargarMovimientos() {
  const res = await fetch(`${API}/movimientos/`, {
    headers: { "Authorization": "Bearer " + token }
  });

  const data = await res.json();

  if (!res.ok) {
    alert("Error al cargar movimientos: " + JSON.stringify(data));
    return;
  }

  const lista = document.getElementById("listaMovimientos");
  lista.innerHTML = "";

  data.slice(0, 20).forEach(m => {
    const div = document.createElement("div");
    div.className = "movimiento";

    const icono = m.tipo === "entrada" ? "📥" : "📤";

    div.innerHTML = `
      ${icono} <strong>${m.tipo.toUpperCase()}</strong> | ${m.producto}<br>
      Cantidad: ${m.cantidad} | Usuario: ${m.usuario || "N/A"}<br>
      Recibe: ${m.recibe || "N/A"} | Empleado: ${m.empleado || "N/A"}<br>
      Nota: ${m.nota || "Sin nota"}<br>
      <span class="small">${m.created_at}</span>
    `;

    lista.appendChild(div);
  });
}

window.onload = async () => {
  mostrarSesion();

  if (token) {
    await cargarTodo();
  }
};
</script>

</body>
</html>
