<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Requisiciones - Mexa</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }
    .wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: none;
      border-radius: 8px;
    }
    button, a.btn {
      display: inline-block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
    .primary { background: #22c55e; color: #08110b; }
    .secondary { background: #334155; color: white; }
    .warning { background: #f59e0b; color: #111827; }
    .muted { color: #cbd5e1; font-size: 14px; }
    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      margin-top: 6px;
      background: #334155;
    }
    .hidden { display: none; }
    hr { border: none; border-top: 1px solid #334155; margin: 12px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <a class="btn secondary" href="./index.html">← Volver</a>
      <h1>Requisiciones</h1>
      <p class="muted">Flujo móvil para solicitud y surtido</p>
      <button class="primary" onclick="cargarRequisiciones()">Actualizar lista</button>
    </div>

    <div class="card">
      <h2>Nueva requisición</h2>
      <input id="solicitante" placeholder="Solicitante" />
      <input id="producto_id" type="number" placeholder="Producto ID" />
      <input id="producto_nombre" placeholder="Nombre producto" />
      <input id="cantidad_solicitada" type="number" placeholder="Cantidad solicitada" />
      <textarea id="nota" placeholder="Nota"></textarea>
      <button class="primary" onclick="crearRequisicion()">Crear requisición</button>
      <p id="msgCrear" class="muted"></p>
    </div>

    <div id="detalleBox" class="card hidden"></div>

    <div class="card">
      <h2>Listado</h2>
      <div id="lista"></div>
    </div>
  </div>

  <script>
    const API = "https://mexa-core-1.onrender.com";

    function getToken() {
      return localStorage.getItem("mexa_token");
    }

    function authHeaders(json = false) {
      const headers = {
        "Authorization": "Bearer " + getToken()
      };
      if (json) headers["Content-Type"] = "application/json";
      return headers;
    }

    function ensureLogin() {
      if (!getToken()) {
        alert("Primero inicia sesión");
        window.location.href = "./index.html";
      }
    }

    async function cargarRequisiciones() {
      ensureLogin();
      const lista = document.getElementById("lista");
      lista.innerHTML = "Cargando...";

      try {
        const res = await fetch(API + "/requisiciones/", {
          headers: authHeaders()
        });
        const data = await res.json();

        if (!res.ok) {
          lista.innerHTML = `<p class="muted">${JSON.stringify(data)}</p>`;
          return;
        }

        if (!data.length) {
          lista.innerHTML = `<p class="muted">No hay requisiciones todavía.</p>`;
          return;
        }

        lista.innerHTML = "";
        data.forEach(r => {
          lista.innerHTML += `
            <div class="card">
              <strong>${r.folio}</strong><br>
              <span class="muted">Solicitante: ${r.solicitante}</span><br>
              <span class="pill">${r.estado}</span><br>
              <span class="muted">Partidas: ${r.detalles.length}</span>
              <button class="secondary" onclick="verRequisicion(${r.id})">Ver detalle</button>
            </div>
          `;
        });
      } catch (e) {
        lista.innerHTML = `<p class="muted">Error al cargar requisiciones</p>`;
      }
    }

    async function crearRequisicion() {
      ensureLogin();
      const msg = document.getElementById("msgCrear");

      const payload = {
        solicitante: document.getElementById("solicitante").value.trim(),
        nota: document.getElementById("nota").value.trim(),
        detalles: [
          {
            producto_id: Number(document.getElementById("producto_id").value),
            producto_nombre: document.getElementById("producto_nombre").value.trim(),
            cantidad_solicitada: Number(document.getElementById("cantidad_solicitada").value),
            nota: document.getElementById("nota").value.trim() || null
          }
        ]
      };

      msg.textContent = "Guardando...";

      try {
        const res = await fetch(API + "/requisiciones/", {
          method: "POST",
          headers: authHeaders(true),
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          msg.textContent = data.detail ? JSON.stringify(data.detail) : JSON.stringify(data);
          return;
        }

        msg.textContent = "Requisición creada";
        document.getElementById("solicitante").value = "";
        document.getElementById("producto_id").value = "";
        document.getElementById("producto_nombre").value = "";
        document.getElementById("cantidad_solicitada").value = "";
        document.getElementById("nota").value = "";
        await cargarRequisiciones();
      } catch (e) {
        msg.textContent = "Error al crear requisición";
      }
    }

    async function verRequisicion(id) {
      ensureLogin();
      const box = document.getElementById("detalleBox");
      box.classList.remove("hidden");
      box.innerHTML = "Cargando detalle...";

      try {
        const res = await fetch(API + "/requisiciones/" + id, {
          headers: authHeaders()
        });
        const r = await res.json();

        if (!res.ok) {
          box.innerHTML = `<p class="muted">${JSON.stringify(r)}</p>`;
          return;
        }

        let html = `
          <h2>${r.folio}</h2>
          <p class="muted">Solicitante: ${r.solicitante}</p>
          <p class="muted">Estado: ${r.estado}</p>
          <p class="muted">Nota: ${r.nota || "-"}</p>
          <hr>
        `;

        r.detalles.forEach(d => {
          const pendiente = d.cantidad_solicitada - d.cantidad_surtida;
          html += `
            <div class="card">
              <strong>${d.producto_nombre}</strong><br>
              <span class="muted">Producto ID: ${d.producto_id}</span><br>
              <span class="muted">Solicitado: ${d.cantidad_solicitada}</span><br>
              <span class="muted">Surtido: ${d.cantidad_surtida}</span><br>
              <span class="muted">Pendiente: ${pendiente}</span><br>
              <span class="pill">${d.estado}</span>
              <input id="surtir_${d.id}" type="number" placeholder="Cantidad a surtir ahora" />
              <button class="warning" onclick="surtir(${r.id}, ${d.id})">Surtir</button>
            </div>
          `;
        });

        box.innerHTML = html;
      } catch (e) {
        box.innerHTML = `<p class="muted">Error cargando detalle</p>`;
      }
    }

    async function surtir(requisicionId, detalleId) {
      ensureLogin();
      const input = document.getElementById("surtir_" + detalleId);
      const cantidad = Number(input.value);

      if (!cantidad || cantidad <= 0) {
        alert("Pon una cantidad válida");
        return;
      }

      try {
        const res = await fetch(API + `/requisiciones/${requisicionId}/surtir`, {
          method: "PUT",
          headers: authHeaders(true),
          body: JSON.stringify({
            detalles: [
              {
                detalle_id: detalleId,
                cantidad_surtida: cantidad
              }
            ],
            nota: "Surtido desde frontend móvil"
          })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.detail || "Error al surtir");
          return;
        }

        alert("Surtido aplicado");
        await verRequisicion(requisicionId);
        await cargarRequisiciones();
      } catch (e) {
        alert("Error de conexión al surtir");
      }
    }

    window.onload = () => {
      ensureLogin();
      cargarRequisiciones();
    };
  </script>
</body>
</html>
